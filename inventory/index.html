<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2b2830">
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <title>Mochila - Lendas de Valdoria</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        var v = Date.now();
        document.write('<link rel="stylesheet" href="../valdoria-design.css?v=' + v + '">');
        document.write('<link rel="stylesheet" href="inventory.css?v=' + v + '">');
    </script>
</head>

<body>
    <!-- Loading -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"><svg class="vi" width="32" height="32" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="19" x2="19" y2="5" />
                <line x1="14" y1="5" x2="19" y2="10" />
                <line x1="5" y1="15" x2="9" y2="19" />
                <circle cx="7" cy="17" r="1" />
            </svg></div>
        <div class="loading-text">Carregando mochila...</div>
    </div>

    <div class="header">
        <h1><svg class="vi" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="6" y="8" width="12" height="13" rx="2" />
                <path d="M9 8V5a3 3 0 0 1 6 0v3" />
                <path d="M6 13h12" />
                <rect x="9" y="15" width="6" height="3" rx="1" />
            </svg> MOCHILA</h1>
        <div class="header-stats" id="headerStats"></div>
    </div>
    <div class="tabs" id="tabsBar"></div>
    <div class="content" id="mainContent"></div>
    <div class="selection-bar hidden" id="selectionBar"></div>
    <div class="bottom-bar" id="bottomBar">
        <div class="ops-count" id="opsCount"></div>
        <button class="confirm-btn hidden" id="confirmBtn" onclick="showConfirmModal()">
            Confirmar Alterações
        </button>
    </div>

    <!-- Modal Overlay -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
        <div class="modal" id="modalContent"></div>
    </div>

    <script>
        var v = Date.now();
        document.write('<script src="inventory.js?v=' + v + '"><\/script>');
    </script>
</body>

</html>
