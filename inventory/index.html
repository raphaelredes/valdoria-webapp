<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2a2420">
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <link rel="stylesheet" href="../shared/fonts.css">
    <title>Mochila - Lendas de Valdoria</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        var v = Date.now();
        document.write('<link rel="stylesheet" href="../valdoria-design.css?v=' + v + '">');
        document.write('<link rel="stylesheet" href="inventory.css?v=' + v + '">');
    </script>
    <script src="../shared/font-apply.js"></script>
</head>

<body>
    <!-- Loading -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"><svg class="vi" width="32" height="32" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="19" x2="19" y2="5" />
                <line x1="14" y1="5" x2="19" y2="10" />
                <line x1="5" y1="15" x2="9" y2="19" />
                <circle cx="7" cy="17" r="1" />
            </svg></div>
        <div class="loading-text">Carregando mochila...</div>
    </div>

    <div class="header">
        <h1><svg class="vi" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="6" y="8" width="12" height="13" rx="2" />
                <path d="M9 8V5a3 3 0 0 1 6 0v3" />
                <path d="M6 13h12" />
                <rect x="9" y="15" width="6" height="3" rx="1" />
            </svg> MOCHILA</h1>
        <div class="header-stats" id="headerStats"></div>
    </div>
    <div class="tabs" id="tabsBar"></div>
    <div class="content" id="mainContent"></div>
    <div class="selection-bar hidden" id="selectionBar"></div>
    <div class="bottom-bar" id="bottomBar">
        <div class="ops-count" id="opsCount"></div>
        <button class="confirm-btn hidden" id="confirmBtn" onclick="showConfirmModal()">
            Confirmar Alterações
        </button>
    </div>

    <div class="inv-nav-bar" id="navBar">
        <button class="inv-nav-btn" onclick="navBack()">
            <svg class="vi" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            <span>🏘️ Cidade</span>
        </button>
        <button class="inv-nav-btn" onclick="navCharSheet()">
            <svg class="vi" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="2"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="13" y2="16"/></svg>
            <span>Ficha</span>
        </button>
        <button class="inv-nav-btn" onclick="navMenu()">
            <svg class="vi" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>Menu</span>
        </button>
    </div>

    <!-- Modal Overlay -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
        <div class="modal" id="modalContent"></div>
    </div>

    <script>
        var v = Date.now();
        document.write('<script src="../shared/fetch-utils.js?v=' + v + '"><\/script>');
        document.write('<script src="../shared/error-reporter.js?v=' + v + '"><\/script>');
        document.write('<script src="inventory.js?v=' + v + '"><\/script>');
    </script>
</body>

</html>
