<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2b2830">
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <title>Mochila - Lendas de Valdoria</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="../valdoria-design.css?v=4">
    <style>
        body { padding-bottom: 80px; }

        /* ── Header ── */
        .header {
            background: linear-gradient(135deg, var(--v-bg-raised), var(--v-bg-accent));
            padding: 14px 16px 10px;
            text-align: center;
            border-bottom: 2px solid var(--v-gold-dim);
            position: sticky; top: 0; z-index: 100;
        }
        .header::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, var(--v-crimson), var(--v-gold), var(--v-crimson), transparent);
        }
        .header h1 { font-size: 17px; color: var(--v-gold); margin-bottom: 4px;
            text-shadow: 0 0 15px rgba(196,149,58,0.4), 0 2px 4px rgba(0,0,0,0.5);
            letter-spacing: 2px; text-transform: uppercase; }
        .header-stats {
            font-size: 12px; color: var(--v-text-dim);
            display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;
        }
        .header-stats .hs-hp { color: var(--v-danger); }
        .header-stats .hs-mp { color: var(--v-info); }
        .header-stats .hs-gold { color: var(--v-gold); }
        .header-stats .hs-ac { color: var(--v-silver); }
        .stat-pop { animation: statPop 0.3s ease; }
        @keyframes statPop { 0% { transform: scale(1); } 50% { transform: scale(1.25); } 100% { transform: scale(1); } }

        /* ── Tabs ── */
        .tabs {
            display: flex; gap: 4px; padding: 10px 12px;
            background: var(--v-bg-raised);
            border-bottom: 1px solid var(--v-border);
        }
        .tab {
            flex: 1; text-align: center;
            padding: 8px 10px; border-radius: var(--v-radius-pill);
            font-size: 13px; border: 1px solid var(--v-border);
            background: var(--v-bg-card); color: var(--v-text-dim);
            cursor: pointer; transition: all 0.2s; white-space: nowrap;
        }
        .tab.active {
            background: var(--v-gold-dim); color: #fff;
            border-color: var(--v-gold);
        }

        /* ── Content ── */
        .content { padding: 12px; }

        /* ── Search Bar ── */
        .search-bar {
            display: flex; gap: 6px; margin-bottom: 8px; align-items: center;
        }
        .search-bar input {
            flex: 1; padding: 8px 12px; border-radius: var(--v-radius-pill);
            border: 1px solid var(--v-border); background: var(--v-bg-card);
            color: var(--v-text-bright); font-size: 13px; font-family: var(--v-font);
            outline: none; transition: border-color 0.2s;
        }
        .search-bar input:focus { border-color: var(--v-gold-dim); }
        .search-bar input::placeholder { color: var(--v-text-dim); }
        .sort-btn {
            padding: 8px 10px; border-radius: var(--v-radius-pill);
            border: 1px solid var(--v-border); background: var(--v-bg-card);
            color: var(--v-text-dim); font-size: 13px; cursor: pointer;
            white-space: nowrap; transition: all 0.2s;
        }
        .sort-btn.active { border-color: var(--v-gold-dim); color: var(--v-gold); }

        /* ── Filters ── */
        .filters {
            display: flex; gap: 6px; margin-bottom: 12px;
            overflow-x: auto; padding-bottom: 4px;
            -webkit-mask-image: linear-gradient(to right, #000 90%, transparent);
            mask-image: linear-gradient(to right, #000 90%, transparent);
        }
        .filters::-webkit-scrollbar { display: none; }
        .filter-btn {
            flex-shrink: 0; padding: 6px 12px;
            border-radius: var(--v-radius-pill);
            font-size: 12px; border: 1px solid var(--v-border);
            background: var(--v-bg-card); color: var(--v-text-dim);
            cursor: pointer; transition: all 0.2s;
        }
        .filter-btn.active {
            background: var(--v-gold-dim); color: #fff;
            border-color: var(--v-gold);
        }
        .filter-count {
            font-size: 10px; opacity: 0.7; margin-left: 2px;
        }

        /* ── Item Cards Grid ── */
        .item-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .item-card {
            background: linear-gradient(165deg, var(--v-bg-card) 0%, var(--v-bg-raised) 100%);
            border: 1px solid var(--v-border); border-radius: var(--v-radius);
            padding: 10px; cursor: pointer; transition: all 0.2s;
            position: relative; overflow: hidden;
            border-left: 3px solid var(--v-border);
        }
        .item-card:active { transform: scale(0.97); }
        .item-card.rarity-uncommon { border-left-color: var(--v-rarity-uncommon); }
        .item-card.rarity-rare { border-left-color: var(--v-rarity-rare); }
        .item-card.rarity-very_rare { border-left-color: var(--v-rarity-very-rare); }
        .item-card.rarity-legendary { border-left-color: var(--v-rarity-legendary);
            box-shadow: 0 0 8px rgba(255,152,0,0.15); }
        .item-card.equipped-marker {
            border-color: var(--v-gold-dim);
            background: linear-gradient(165deg, var(--v-bg-card) 0%, rgba(196,149,58,0.08) 100%);
        }
        .item-card .ic-emoji { font-size: 24px; }
        .item-card .ic-name {
            font-size: 12px; font-weight: 600; color: var(--v-text-bright);
            margin-top: 2px; line-height: 1.3;
            overflow: hidden; text-overflow: ellipsis;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
        }
        .item-card .ic-meta {
            font-size: 11px; color: var(--v-text-dim); margin-top: 3px;
        }
        .item-card .ic-badges {
            position: absolute; top: 5px; right: 6px;
            display: flex; flex-direction: column; align-items: flex-end; gap: 2px;
        }
        .item-card .ic-qty {
            font-size: 10px; color: var(--v-gold); font-weight: 700;
            background: rgba(196,149,58,0.15); padding: 1px 6px;
            border-radius: 8px;
        }
        .item-card .ic-eq-badge {
            font-size: 9px; color: var(--v-gold); font-weight: 600;
            background: rgba(196,149,58,0.12); padding: 1px 5px;
            border-radius: 8px; letter-spacing: 0.3px;
        }
        .item-card .ic-set-badge {
            font-size: 9px; color: var(--v-info); font-weight: 600;
            background: rgba(91,155,213,0.12); padding: 1px 5px;
            border-radius: 8px;
        }
        .item-card .ic-fav {
            position: absolute; bottom: 6px; right: 8px;
            font-size: 10px;
        }

        /* ── Equipment Slot Grid (Paper-Doll) ── */
        .equip-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            max-width: 380px;
            margin: 0 auto;
        }
        .equip-slot {
            background: var(--v-bg-card); border: 1px solid var(--v-border);
            border-radius: var(--v-radius); padding: 10px;
            text-align: center; cursor: pointer; transition: all 0.2s;
            min-height: 60px; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .equip-slot:active { transform: scale(0.97); }
        .equip-slot.filled {
            border-color: var(--v-gold-dim);
            background: linear-gradient(165deg, var(--v-bg-card) 0%, rgba(196,149,58,0.06) 100%);
        }
        .equip-slot .es-label {
            font-size: 10px; color: var(--v-text-dim);
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .equip-slot .es-icon { font-size: 18px; margin: 2px 0; }
        .equip-slot .es-item {
            font-size: 11px; color: var(--v-text-bright);
            font-weight: 600; line-height: 1.2;
            overflow: hidden; text-overflow: ellipsis;
            white-space: nowrap; max-width: 100%;
        }
        .equip-slot .es-badges {
            display: flex; gap: 3px; margin-top: 2px;
        }
        .es-gem-dot { width: 8px; height: 8px; border-radius: 50%;
            background: var(--v-border); border: 1px solid var(--v-text-dim); }
        .es-gem-dot.filled { background: var(--v-gold); border-color: var(--v-gold); }
        .es-rune-dot { font-size: 8px; color: var(--v-info); }

        /* ── Stats Summary Bar ── */
        .stats-summary {
            display: flex; gap: 6px; margin-bottom: 12px; padding: 10px;
            background: var(--v-bg-card); border-radius: var(--v-radius);
            border: 1px solid var(--v-border); justify-content: center; flex-wrap: wrap;
        }
        .ss-item {
            font-size: 12px; padding: 3px 8px; border-radius: var(--v-radius-pill);
            background: rgba(196,149,58,0.08); color: var(--v-text-dim);
        }
        .ss-item b { color: var(--v-text-bright); }

        /* ── Set Progress ── */
        .set-progress {
            background: var(--v-bg-card); border: 1px solid var(--v-border);
            border-radius: var(--v-radius); padding: 10px; margin-bottom: 10px;
        }
        .set-title { font-size: 13px; font-weight: 600; color: var(--v-gold); margin-bottom: 4px; }
        .set-pieces { font-size: 11px; color: var(--v-text-dim); }
        .set-piece { margin: 2px 0; }
        .set-piece.owned { color: var(--v-success); }
        .set-piece.missing { color: var(--v-text-dim); opacity: 0.5; }
        .set-bonus { font-size: 11px; margin-top: 4px; padding: 4px 8px;
            border-radius: var(--v-radius-sm); }
        .set-bonus.active { background: rgba(76,175,80,0.12); color: var(--v-success); }
        .set-bonus.inactive { background: rgba(255,255,255,0.04); color: var(--v-text-dim); opacity: 0.6; }

        /* ── Ally Cards ── */
        .ally-card {
            background: var(--v-bg-card); border: 1px solid var(--v-border);
            border-radius: var(--v-radius); padding: 12px;
            margin-bottom: 8px; cursor: pointer; transition: all 0.2s;
        }
        .ally-card:active { transform: scale(0.97); }
        .ally-header {
            display: flex; justify-content: space-between; align-items: center;
        }
        .ally-name { font-size: 14px; font-weight: 600; color: var(--v-text-bright); }
        .ally-class { font-size: 12px; color: var(--v-text-dim); }
        .ally-stats {
            display: flex; gap: 10px; margin-top: 4px; font-size: 12px;
        }
        .ally-hp { color: var(--v-danger); }
        .ally-ac { color: var(--v-silver); }

        /* ── Modal Overlay ── */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 200;
            background: rgba(0,0,0,0.7);
            display: flex; align-items: flex-end; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.2s;
        }
        .modal-overlay.visible { opacity: 1; pointer-events: auto; }
        .modal {
            background: var(--v-bg-raised); border-radius: 16px 16px 0 0;
            width: 100%; max-width: 480px; max-height: 85vh;
            overflow-y: auto; padding: 16px 16px 24px;
            transform: translateY(100%); transition: transform 0.3s ease-out;
            touch-action: pan-y;
        }
        .modal-overlay.visible .modal { transform: translateY(0); }
        .modal-handle {
            width: 36px; height: 4px; border-radius: 2px;
            background: var(--v-border); margin: 0 auto 12px;
            cursor: grab;
        }
        .modal-title {
            font-size: 16px; font-weight: 700; color: var(--v-gold);
            margin-bottom: 12px; text-align: center;
        }

        /* ── Modal: Item Detail ── */
        .detail-row {
            display: flex; justify-content: space-between;
            padding: 4px 0; font-size: 13px;
        }
        .detail-label { color: var(--v-text-dim); }
        .detail-val { color: var(--v-text-bright); font-weight: 600; }
        .detail-val.bonus { color: var(--v-success); }
        .detail-val.penalty { color: var(--v-danger); }
        .detail-rarity-badge {
            display: inline-block; padding: 2px 10px; border-radius: var(--v-radius-pill);
            font-size: 11px; font-weight: 600; margin-bottom: 8px;
        }
        .detail-desc {
            font-size: 12px; color: var(--v-text-dim);
            font-style: italic; margin: 8px 0; line-height: 1.4;
        }
        .detail-tags {
            display: flex; gap: 4px; flex-wrap: wrap; margin: 8px 0;
        }
        .detail-tag {
            font-size: 10px; padding: 2px 8px; border-radius: 10px;
            background: var(--v-bg-card); color: var(--v-text-dim);
            border: 1px solid var(--v-border);
        }
        .detail-actions {
            display: flex; gap: 8px; margin-top: 12px;
        }
        .detail-actions button {
            flex: 1; padding: 10px; border: none; border-radius: var(--v-radius);
            font-size: 13px; font-weight: 600; cursor: pointer;
            font-family: var(--v-font); transition: all 0.2s;
        }
        .detail-actions button:active { transform: scale(0.96); }
        .btn-equip {
            background: linear-gradient(135deg, var(--v-gold), var(--v-gold-dim));
            color: var(--v-bg);
        }
        .btn-use {
            background: linear-gradient(135deg, var(--v-success), #388e3c);
            color: #fff;
        }
        .btn-unequip {
            background: var(--v-bg-card); border: 1px solid var(--v-border) !important;
            color: var(--v-text-dim);
        }
        .btn-sell {
            background: linear-gradient(135deg, #ffa726, #ef6c00);
            color: #fff;
        }
        .btn-discard {
            background: linear-gradient(135deg, #ef5350, #b71c1c);
            color: #fff;
        }
        .btn-sell-junk {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 4px 10px; border-radius: var(--v-radius); border: 1px solid var(--v-warning);
            background: rgba(255,152,0,0.1); color: var(--v-warning); font-size: 11px;
            cursor: pointer; white-space: nowrap;
        }
        .btn-disabled {
            background: var(--v-border) !important; color: var(--v-text-dim) !important;
            cursor: not-allowed !important;
        }

        /* ── Gem / Rune Section in Slot Modal ── */
        .gem-grid {
            display: flex; gap: 8px; margin: 8px 0;
            justify-content: center;
        }
        .gem-socket {
            width: 42px; height: 42px; border-radius: 50%;
            border: 2px dashed var(--v-border); display: flex;
            align-items: center; justify-content: center;
            font-size: 18px; cursor: pointer; transition: all 0.2s;
            background: var(--v-bg-card);
        }
        .gem-socket.filled {
            border-style: solid; border-color: var(--v-gold);
            background: linear-gradient(135deg, var(--v-bg-card), rgba(196,149,58,0.08));
        }
        .gem-socket:active { transform: scale(0.9); }
        .rune-slot {
            background: var(--v-bg-card); border: 1px dashed var(--v-border);
            border-radius: var(--v-radius); padding: 10px;
            text-align: center; cursor: pointer; transition: all 0.2s;
            margin: 8px 0;
        }
        .rune-slot.filled {
            border-style: solid; border-color: var(--v-info);
        }

        /* ── Compatible Items List ── */
        .compat-list { margin-top: 10px; }
        .compat-item {
            display: flex; align-items: center; gap: 8px;
            padding: 8px; background: var(--v-bg-card);
            border-radius: var(--v-radius-sm); margin-bottom: 4px;
            cursor: pointer; font-size: 13px; transition: all 0.2s;
            border: 1px solid transparent;
        }
        .compat-item:active { transform: scale(0.98); }
        .compat-item.better { border-color: rgba(76,175,80,0.4);
            background: linear-gradient(135deg, var(--v-bg-card), rgba(76,175,80,0.06)); }
        .compat-item.worse { border-color: rgba(231,76,60,0.3);
            background: linear-gradient(135deg, var(--v-bg-card), rgba(231,76,60,0.04)); }
        .compat-emoji { font-size: 18px; flex-shrink: 0; }
        .compat-info { flex: 1; overflow: hidden; }
        .compat-name { font-size: 12px; font-weight: 600; color: var(--v-text-bright);
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .compat-stats { font-size: 11px; color: var(--v-text-dim); }
        .compat-delta {
            font-size: 11px; font-weight: 600; flex-shrink: 0;
            padding: 2px 6px; border-radius: 8px;
        }
        .compat-delta.up { color: var(--v-success); background: rgba(76,175,80,0.12); }
        .compat-delta.down { color: var(--v-danger); background: rgba(231,76,60,0.1); }

        /* ── Gem/Rune Select List ── */
        .select-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px; background: var(--v-bg-card);
            border-radius: var(--v-radius); margin-bottom: 6px;
            cursor: pointer; transition: all 0.2s;
            border: 1px solid var(--v-border);
        }
        .select-item:active { transform: scale(0.98); }
        .select-item .si-emoji { font-size: 20px; }
        .select-item .si-name { font-size: 13px; color: var(--v-text-bright); font-weight: 600; }
        .select-item .si-desc { font-size: 11px; color: var(--v-text-dim); }

        /* ── Bottom Bar ── */
        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 10px 16px; z-index: 150;
            padding-bottom: max(10px, env(safe-area-inset-bottom));
            background: linear-gradient(transparent, var(--v-bg) 30%);
        }
        .bottom-bar .ops-count {
            text-align: center; font-size: 12px;
            color: var(--v-text-dim); margin-bottom: 6px;
        }
        .confirm-btn {
            width: 100%; padding: 14px; border: none;
            border-radius: var(--v-radius); font-size: 15px;
            font-weight: 700; cursor: pointer; transition: all 0.2s;
            font-family: var(--v-font);
            background: linear-gradient(135deg, var(--v-gold), var(--v-gold-dim));
            color: var(--v-bg);
            box-shadow: 0 3px 12px rgba(196,149,58,0.3);
        }
        .confirm-btn:active { transform: scale(0.98); }
        .confirm-btn.hidden { display: none; }

        /* ── Confirm Modal ── */
        .confirm-ops-list {
            max-height: 300px; overflow-y: auto; margin: 8px 0;
        }
        .confirm-op {
            padding: 6px 0; border-bottom: 1px solid var(--v-border);
            font-size: 13px; color: var(--v-text);
        }
        .confirm-op:last-child { border-bottom: none; }

        /* ── Empty State ── */
        .empty-state {
            text-align: center; padding: 40px 20px; color: var(--v-text-dim);
        }
        .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
        .empty-state p { line-height: 1.5; }

        /* ── Section Title ── */
        .section-title {
            font-size: 13px; font-weight: 600; color: var(--v-gold);
            margin: 12px 0 8px; padding-bottom: 4px;
            border-bottom: 1px solid var(--v-border);
        }

        /* ── SVG Icons ── */
        .vi { display: inline-block; vertical-align: -0.15em; flex-shrink: 0; }

        /* ── Loading Overlay ── */
        .loading-overlay {
            position: fixed; inset: 0; z-index: 999;
            background: var(--v-bg); display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.3s;
        }
        .loading-overlay.hidden { opacity: 0; pointer-events: none; }
        .loading-spinner { font-size: 36px; animation: v-spin 1.5s linear infinite; }
        .loading-text { font-size: 14px; color: var(--v-text-dim); margin-top: 12px; }

        /* ── Animations ── */
        .fade-in { animation: v-fadeIn 0.3s ease; }

        /* ── Toast ── */
        .toast {
            position: fixed; left: 50%;
            transform: translateX(-50%); padding: 8px 18px;
            border-radius: var(--v-radius-pill); font-size: 13px;
            z-index: 300; animation: v-fadeSlideUp 0.25s ease;
            pointer-events: none; color: #fff;
            /* Dynamic bottom: set via JS based on bottom bar height */
            bottom: 90px;
        }
        .toast-warn { background: var(--v-warning); }
        .toast-err { background: var(--v-danger); }
        .toast-ok { background: var(--v-success); }

        @media (prefers-reduced-motion: reduce) {
            .fade-in, .stat-pop, .toast { animation: none !important; }
            .modal, .modal-overlay { transition: none !important; }
        }
    </style>
</head>
<body>
    <!-- Loading -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"><svg class="vi" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="19" x2="19" y2="5"/><line x1="14" y1="5" x2="19" y2="10"/><line x1="5" y1="15" x2="9" y2="19"/><circle cx="7" cy="17" r="1"/></svg></div>
        <div class="loading-text">Carregando mochila...</div>
    </div>

    <div class="header">
        <h1><svg class="vi" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="8" width="12" height="13" rx="2"/><path d="M9 8V5a3 3 0 0 1 6 0v3"/><path d="M6 13h12"/><rect x="9" y="15" width="6" height="3" rx="1"/></svg> MOCHILA</h1>
        <div class="header-stats" id="headerStats"></div>
    </div>
    <div class="tabs" id="tabsBar"></div>
    <div class="content" id="mainContent"></div>
    <div class="bottom-bar" id="bottomBar">
        <div class="ops-count" id="opsCount"></div>
        <button class="confirm-btn hidden" id="confirmBtn" onclick="showConfirmModal()">
            Confirmar Alterações
        </button>
    </div>

    <!-- Modal Overlay -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
        <div class="modal" id="modalContent"></div>
    </div>

    <script>
    /* ═══════════════════════════════════════════════════════════
       INVENTORY WEBAPP — Lendas de Valdoria v2
       ═══════════════════════════════════════════════════════════ */

    const tg = window.Telegram?.WebApp;
    const _vBg = getComputedStyle(document.documentElement)
        .getPropertyValue('--v-bg').trim() || '#2b2830';

    // ── Rarity config (from payload or fallback) ──

    function getRarityLabel(r) { return (getRarityConfig()[r] || RARITY_FALLBACK.common).l; }

    // ── UTF-8 Base64 Decode ──
    function decodeBase64Utf8(b64) {
        const raw = b64.replace(/-/g, '+').replace(/_/g, '/');
        const binary = atob(raw);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        return new TextDecoder().decode(bytes);
    }

    // ── Init ──
    function init() {
        const params = new URLSearchParams(location.search);
        const b64 = params.get('data');
        if (!b64) { hideLoading(); showError('Dados não encontrados.'); return; }
        try {
            D = JSON.parse(decodeBase64Utf8(b64));
        } catch(e) { console.error('[INVENTORY] Erro ao decodificar dados', e); hideLoading(); showError('Erro ao decodificar dados.'); return; }

        // Init local state from payload
        localEq = Object.assign({}, D.eq || {});
        localInv = (D.inv || []).map(i => ({...i}));
        localGold = D.p.g || 0;
        localHP = D.p.hp || 0;
        localMP = D.p.mp || 0;
        localPotions = D.p.pot || 0;
        localFavs = D.fav ? [...D.fav] : [];
        localGems = {};
        if (D.gems) {
            for (const [k,v] of Object.entries(D.gems))
                localGems[k] = [...v];
        }
        localRunes = D.runes ? {...D.runes} : {};
        localAllyEq = {};
        if (D.allies) {
            for (const a of D.allies)
                localAllyEq[a.id] = Object.assign({}, a.eq || {});
        }

        hideLoading();
        updateHeader();
        buildTabs();
        renderTab();
        initSwipeToDismiss();
        initBackButton();
    }

    function hideLoading() {
        document.getElementById('loadingOverlay').classList.add('hidden');
    }

    function showError(msg) {
        console.error('[INVENTORY]', msg);
        document.getElementById('mainContent').innerHTML =
            `<div class="empty-state"><div class="icon">${vi('warn',32)}</div><p>${msg}</p></div>`;
    }

    // ── Haptic feedback ──
    function haptic(type) {
        try { tg?.HapticFeedback?.impactOccurred?.(type || 'light'); } catch(e) {}
    }

    // ── Header ──
    function calcLocalAC() {
        // Base AC from server (includes DEX, class features, unarmored defense)
        // We adjust by calculating the delta between original equipment bonuses and current
        let origEqAC = 0;
        for (const item of Object.values(D.eq || {})) {
            if (!item) continue;
            const it = getItemData(item);
            origEqAC += it.ac || 0;
            // Original gem bonuses
            const origGems = (D.gems || {})[getSlotForItem(item, D.eq)] || [];
            origGems.forEach(g => { if (g) { const gd = getItemData(g); origEqAC += gd.gb?.ac_bonus || 0; } });
        }
        let newEqAC = 0;
        for (const [slot, item] of Object.entries(localEq)) {
            if (!item) continue;
            const it = getItemData(item);
            newEqAC += it.ac || 0;
            const gems = localGems[slot] || [];
            gems.forEach(g => { if (g) { const gd = getItemData(g); newEqAC += gd.gb?.ac_bonus || 0; } });
        }
        localAC = D.p.ac + (newEqAC - origEqAC);
        return localAC;
    }

    function getSlotForItem(itemName, eq) {
        for (const [slot, name] of Object.entries(eq || {})) { if (name === itemName) return slot; }
        return '';
    }

    function updateHeader() {
        calcLocalAC();
        const s = document.getElementById('headerStats');
        const potStr = localPotions > 0 ? `<span class="hs-hp">${vi('flask',12)} ${localPotions}</span>` : '';
        let buffsStr = '';
        if (D.buffs && D.buffs.length > 0) {
            buffsStr = D.buffs.map(b =>
                `<span style="font-size:10px;opacity:0.8;">${b.i}${b.c}</span>`
            ).join('');
        }
        s.innerHTML = `
            <span>${D.p.n}</span>
            <span class="hs-hp">${vi('heart',12)} ${localHP}/${D.p.mhp}</span>
            <span class="hs-mp">${vi('orb',12)} ${localMP}/${D.p.mmp}</span>
            <span class="hs-gold">${vi('coin',12)} ${localGold}</span>
            <span class="hs-ac">${vi('shield',12)} ${localAC}</span>
            ${potStr}${buffsStr}
        `;
    }

    function animateStat(cls) {
        const el = document.querySelector(`.${cls}`);
        if (el) { el.classList.remove('stat-pop');
            void el.offsetWidth; el.classList.add('stat-pop'); }
    }

    // ── Tabs ──
    function buildTabs() {
        const bar = document.getElementById('tabsBar');
        const tabs = [
            {id:'items', label:`${vi('bag',15)} Itens`},
            {id:'equip', label:`${vi('armorTab',15)} Equipamento`},
        ];
        if (D.allies && D.allies.length > 0) tabs.push({id:'allies', label:`${vi('people',15)} Aliados`});
        if (D.bank) tabs.push({id:'bank', label:`${vi('vault',15)} Cofre`});
        bar.innerHTML = tabs.map(t =>
            `<div class="tab ${t.id===activeTab?'active':''}" onclick="switchTab('${t.id}')">${t.label}</div>`
        ).join('');
    }

    function switchTab(id) {
        activeTab = id;
        activeTarget = 'player';
        // Don't reset filter/search when switching tabs
        buildTabs();
        renderTab();
        haptic('light');
    }

    function renderTab() {
        const c = document.getElementById('mainContent');
        if (activeTab === 'items') renderItemsTab(c);
        else if (activeTab === 'equip') renderEquipTab(c);
        else if (activeTab === 'allies') renderAlliesTab(c);
        else if (activeTab === 'bank') renderBankTab(c);
    }

    // ══════════════════════════════════════════════════════════
    //  TAB 1: ITEMS
    // ══════════════════════════════════════════════════════════
    function renderItemsTab(c) {
        const counts = getFilterCounts();
        const filters = [
            {id:'all', label:'Todos', cnt: counts.all},
            {id:'fav', label:`${vi_f('star',13)} Favoritos`, cnt: counts.fav},
            {id:'equip', label:`${vi('sword',13)} Equip`, cnt: counts.equip},
            {id:'use', label:`${vi('flask',13)} Consumíveis`, cnt: counts.use},
            {id:'gem', label:`${vi('gem',13)} Gemas`, cnt: counts.gem},
            {id:'rune', label:`${vi('orb',13)} Runas`, cnt: counts.rune},
            {id:'misc', label:`${vi('bag',13)} Outros`, cnt: counts.misc},
        ];

        let html = '';

        // Search bar + sort
        html += `<div class="search-bar">
            <input type="text" placeholder="Buscar item..." value="${esc(searchQuery)}"
                oninput="onSearch(this.value)" id="searchInput">
            <div class="sort-btn ${sortMode!=='default'?'active':''}" onclick="cycleSort()">
                ${SORT_LABELS[sortMode]}
            </div>
        </div>`;

        // Filters with counts
        html += '<div class="filters">';
        filters.forEach(f => {
            const cntBadge = f.cnt > 0 ? `<span class="filter-count">(${f.cnt})</span>` : '';
            html += `<div class="filter-btn ${f.id===activeFilter?'active':''}"
                onclick="setFilter('${f.id}')">${f.label}${cntBadge}</div>`;
        });
        html += '</div>';

        // Quick action: Sell Junk
        const junkCount = getJunkItems().reduce((sum, j) => sum + j.q, 0);
        if (junkCount > 0 && !searchQuery) {
            let junkGP = 0;
            getJunkItems().forEach(inv => {
                const jit = getItemData(inv.n);
                junkGP += Math.max(1, Math.floor((jit.v || 1) * 0.6)) * inv.q;
            });
            html += `<div style="text-align:right;margin-bottom:6px;">
                <span class="btn-sell-junk" onclick="doSellJunk()">${vi('coin',13)} Vender Lixo (${junkCount}) · ${junkGP}gp</span>
            </div>`;
        }

        // Potion counter card (basic potions, separate from inventory)
        if (localPotions > 0 && (activeFilter === 'all' || activeFilter === 'use')
            && (!searchQuery || 'poção de cura'.includes(searchQuery))) {
            html += `<div style="margin-bottom:10px;"><div class="item-grid">
                <div class="item-card rarity-common fade-in" onclick="doUsePotion()" style="grid-column: span 2;
                    display:flex;align-items:center;gap:12px;padding:12px;">
                    <span style="font-size:28px;">${vi('flask',28)}</span>
                    <div style="flex:1;">
                        <div class="ic-name" style="font-size:14px;">Poção de Cura</div>
                        <div class="ic-meta">Cura 2d4+2 HP</div>
                    </div>
                    <span class="ic-qty" style="font-size:13px;">x${localPotions}</span>
                </div>
            </div></div>`;
        }

        // Truncation warning
        if (D.trunc) {
            html += `<div style="background:rgba(255,152,0,0.1);border:1px solid var(--v-warning);border-radius:var(--v-radius);padding:8px 12px;margin-bottom:10px;font-size:12px;color:var(--v-warning);text-align:center;">
                ${vi('warn',13)} Mostrando 40 de ${D.trunc} itens. Use o bot para gerenciar os demais.
            </div>`;
        }

        const items = getSortedFilteredItems();
        if (!items.length && localPotions <= 0) {
            const emptyMsg = searchQuery ? 'Nenhum item encontrado para a busca.' : 'Nenhum item encontrado.';
            html += `<div class="empty-state"><div class="icon">${vi('bag',32)}</div><p>${emptyMsg}</p></div>`;
        } else if (items.length) {
            html += '<div class="item-grid">';
            items.forEach(inv => {
                const it = getItemData(inv.n);
                const rarity = it.r || 'common';
                const equipped = isEquippedAnywhere(inv.n);
                const setId = it.si || '';
                html += `<div class="item-card rarity-${rarity} ${equipped?'equipped-marker':''} fade-in"
                    onclick="openItemDetail('${esc(inv.n)}')">
                    <div class="ic-badges">
                        ${inv.q > 1 ? `<span class="ic-qty">x${inv.q}</span>` : ''}
                        ${equipped ? '<span class="ic-eq-badge">Equipado</span>' : ''}
                        ${setId ? `<span class="ic-set-badge">${getSetIcon(setId)}</span>` : ''}
                    </div>
                    ${isFav(inv.n) ? `<span class="ic-fav">${vi_f('star',14)}</span>` : ''}
                    <div class="ic-emoji">${it.e||'📦'}</div>
                    <div class="ic-name v-rarity-${rarity}">${inv.n}</div>
                    <div class="ic-meta">${getItemShortDesc(inv.n, it)}</div>
                </div>`;
            });
            html += '</div>';
        }
        c.innerHTML = html;
    }

    let _searchTimer = null;
    function onSearch(val) {
        clearTimeout(_searchTimer);
        _searchTimer = setTimeout(() => {
            searchQuery = val.toLowerCase().trim();
            renderTab();

            if (inp) { inp.focus(); inp.selectionStart = inp.selectionEnd = inp.value.length; }
        }, 150);

    function cycleSort() {
        const idx = SORT_CYCLE.indexOf(sortMode);
        sortMode = SORT_CYCLE[(idx + 1) % SORT_CYCLE.length];
        haptic('light');
        renderTab();
    }

    function setFilter(f) {
        activeFilter = f;
        renderTab();
    }

    function getFilterCounts() {
        const all = localInv.filter(i => i.q > 0);
        const counts = { all: all.length, fav: 0, equip: 0, use: 0, gem: 0, rune: 0, misc: 0 };
        all.forEach(inv => {
            const it = getItemData(inv.n);
            const tags = it.t || [];
            if (isFav(inv.n)) counts.fav++;
            if (it.s) counts.equip++;
            if (tags.includes('consumable') || tags.includes('food') || tags.includes('potion')) counts.use++;
            if (tags.includes('gem') || tags.includes('socketable')) counts.gem++;
            if (tags.includes('rune')) counts.rune++;
            if (!it.s && !tags.includes('consumable') && !tags.includes('food')
                && !tags.includes('potion') && !tags.includes('gem')
                && !tags.includes('socketable') && !tags.includes('rune')) counts.misc++;
        });
        return counts;
    }

    function getSortedFilteredItems() {
        let items = getFilteredItems();
        // Search
        if (searchQuery) {
            items = items.filter(inv => inv.n.toLowerCase().includes(searchQuery));
        }
        // Sort
        if (sortMode === 'name') {
            items.sort((a, b) => a.n.localeCompare(b.n));
        } else if (sortMode === 'rarity') {
            items.sort((a, b) => {
                const ra = RARITY_ORDER[getItemData(a.n).r || 'common'] || 0;
                const rb = RARITY_ORDER[getItemData(b.n).r || 'common'] || 0;
                return rb - ra; // Higher rarity first
            });
        } else if (sortMode === 'value') {
            items.sort((a, b) => (getItemData(b.n).v || 0) - (getItemData(a.n).v || 0));
        }
        return items;
    }

    function getFilteredItems() {
        let items = localInv.filter(i => i.q > 0);
        if (activeFilter === 'all') return items;
        return items.filter(inv => {
            const it = getItemData(inv.n);
            const tags = it.t || [];
            if (activeFilter === 'fav') return isFav(inv.n);
            if (activeFilter === 'equip') return !!it.s;
            if (activeFilter === 'use') return tags.includes('consumable') || tags.includes('food') || tags.includes('potion');
            if (activeFilter === 'gem') return tags.includes('gem') || tags.includes('socketable');
            if (activeFilter === 'rune') return tags.includes('rune');
            if (activeFilter === 'misc') return !it.s && !tags.includes('consumable') && !tags.includes('food')
                && !tags.includes('potion') && !tags.includes('gem') && !tags.includes('socketable') && !tags.includes('rune');
            return true;
        });
    }

    // ══════════════════════════════════════════════════════════
    //  TAB 2: EQUIPMENT
    // ══════════════════════════════════════════════════════════
    function renderEquipTab(c) {
        let html = '';

        // Stats summary
        if (activeTarget === 'player') {
            html += buildStatsSummary();
            html += buildSetProgress();
            html += buildLoadoutBar();
        }

        html += '<div class="equip-grid">';
        const eq = activeTarget === 'player' ? localEq : (localAllyEq[activeTarget] || {});

        SLOT_ORDER.forEach(slot => {
            const item = eq[slot] || null;
            const it = item ? getItemData(item) : null;
            const filled = item ? 'filled' : '';
            const icon = item ? (it?.e || '📦') : getSlotEmptyIcon(slot);
            const label = SLOT_NAMES[slot] || slot;
            const nameDisplay = item ? item : '—';
            const rarity = item ? (it?.r || 'common') : '';

            // Gem/Rune badges for player slots
            let badges = '';
            if (activeTarget === 'player' && item) {
                const sockets = it?.sk || 0;
                const gems = localGems[slot] || [];
                const rune = localRunes[slot];
                if (sockets > 0) {
                    badges += '<div class="es-badges">';
                    for (let i = 0; i < sockets; i++) {
                        const gFilled = gems[i] ? 'filled' : '';
                        badges += `<div class="es-gem-dot ${gFilled}"></div>`;
                    }
                    if (rune) badges += `<span class="es-rune-dot">${vi('orb',10)}</span>`;
                    badges += '</div>';
                } else if (rune) {
                    badges += `<div class="es-badges"><span class="es-rune-dot">${vi('orb',10)}</span></div>`;
                }
            }

            // Upgrade available indicator
            let upgradeBadge = '';
            if (activeTarget === 'player') {
                const compat = getCompatibleItems(slot);
                const hasUpgrade = compat.some(ci => {
                    const cit = getItemData(ci.name);
                    if (ci.name === item) return false;
                    const { cls } = compareItemsDetailed(cit, it || {ac:0,b:0,hb:0,mb:0}, slot);
                    return cls === 'better';
                });
                if (hasUpgrade) upgradeBadge = '<span style="position:absolute;top:4px;right:6px;font-size:10px;color:var(--v-success);font-weight:700;background:rgba(76,175,80,0.15);padding:1px 5px;border-radius:8px;">⬆</span>';
            }

            html += `<div class="equip-slot ${filled}" onclick="openSlotModal('${slot}')"
                style="position:relative;${rarity && item ? `border-left:3px solid ${getRarityColor(rarity)}` : ''}">
                ${upgradeBadge}
                <div class="es-label">${label}</div>
                <div class="es-icon">${icon}</div>
                <div class="es-item">${nameDisplay}</div>
                ${badges}
            </div>`;
        });
        html += '</div>';
        c.innerHTML = html;
    }

    function buildStatsSummary() {
        let totalAC = 0, totalHP = 0, totalMP = 0, totalATK = 0;
        for (const [slot, item] of Object.entries(localEq)) {
            if (!item) continue;
            const it = getItemData(item);
            totalAC += it.ac || 0;
            totalHP += it.hb || 0;
            totalMP += it.mb || 0;
            totalATK += it.b || 0;
            // Gem bonuses
            const gems = localGems[slot] || [];
            gems.forEach(g => {
                if (!g) return;
                const gd = getItemData(g);
                if (gd.gb) {
                    totalHP += gd.gb.hp_bonus || 0;
                    totalMP += gd.gb.mp_bonus || 0;
                    totalAC += gd.gb.ac_bonus || 0;
                }
            });
        }
        const parts = [];
        if (totalAC) parts.push(`${vi('shield',13)} CA <b>+${totalAC}</b>`);
        if (totalATK) parts.push(`${vi('sword',13)} ATK <b>+${totalATK}</b>`);
        if (totalHP) parts.push(`${vi('heart',13)} HP <b>+${totalHP}</b>`);
        if (totalMP) parts.push(`${vi('orb',13)} MP <b>+${totalMP}</b>`);
        if (!parts.length) return '';
        return `<div class="stats-summary">${parts.map(p => `<div class="ss-item">${p}</div>`).join('')}</div>`;
    }

    function buildSetProgress() {
        if (!D.sets) return '';
        const owned = new Set();
        // Player equipped + inventory
        for (const item of Object.values(localEq)) { if (item) owned.add(item); }
        localInv.forEach(i => { if (i.q > 0) owned.add(i.n); });

        let html = '';
        for (const [sid, sdef] of Object.entries(D.sets)) {
            const count = sdef.pcs.filter(p => owned.has(p)).length;
            if (count === 0) continue;

            html += `<div class="set-progress fade-in">
                <div class="set-title">${sdef.i} ${sdef.n} (${count}/${sdef.pcs.length})</div>
                <div class="set-pieces">`;
            sdef.pcs.forEach(p => {
                const cls = owned.has(p) ? 'owned' : 'missing';
                const icon = owned.has(p) ? vi_f('check',13) : vi('check',13);
                html += `<div class="set-piece ${cls}">${icon} ${p}</div>`;
            });
            html += '</div>';
            // Thresholds
            for (const [th, label] of Object.entries(sdef.th)) {
                const active = count >= parseInt(th);
                html += `<div class="set-bonus ${active?'active':'inactive'}">${active?vi('sparkle',13):vi('lock',13)} ${th}/${sdef.pcs.length}: ${label}</div>`;
            }
            // Equip set button — only if player has unequipped pieces
            const equipped = new Set(Object.values(localEq).filter(Boolean));
            const canEquipPieces = sdef.pcs.filter(p => owned.has(p) && !equipped.has(p));
            if (canEquipPieces.length > 0) {
                html += `<button class="btn-equip" style="width:100%;margin-top:6px;font-size:11px;padding:6px;" onclick="doEquipSet('${esc(sid)}')">${vi('sword',13)} Equipar Set (${canEquipPieces.length})</button>`;
            }
            html += '</div>';
        }
        return html;
    }

    function getSlotEmptyIcon(slot) {
        return vi(SLOT_ICONS[slot] || 'bag', 20);
    }

        renderTab();

    // ── Loadouts ──
    function buildLoadoutBar() {
        const ldout = D.ldout || {};
        const names = Object.keys(ldout);
        let html = '<div style="display:flex;gap:4px;margin:6px 0;flex-wrap:wrap;align-items:center;">';
        html += `<span class="btn-sell-junk" onclick="promptSaveLoadout()" style="border-color:var(--v-gold);">${vi('save',13)} Salvar</span>`;
        names.forEach(n => {
            html += `<span class="btn-sell-junk" onclick="doLoadLoadout('${esc(n)}')" style="border-color:var(--v-text-dim);">${vi('sword',13)} ${n}</span>`;
        });
        html += '</div>';
        return names.length > 0 || true ? html : '';
    }

    function promptSaveLoadout() {
        const name = prompt('Nome do loadout (max 20 chars):');
        if (!name || !name.trim()) return;
        const ldout = D.ldout = D.ldout || {};
        if (Object.keys(ldout).length >= 5) { toast(`${vi('warn',13)} Máximo 5 loadouts`, 'err'); return; }
        ldout[name.trim().slice(0,20)] = Object.assign({}, localEq);
        addOp({t:'save_loadout', name: name.trim().slice(0,20)});
        haptic('medium');
        toast(`${vi('save',13)} '${esc(name.trim().slice(0,20))}' salvo`, 'ok');
        renderTab();
        updateBottomBar();
    }

    function doLoadLoadout(name) {
        const ldout = (D.ldout || {})[name];
        if (!ldout) return;
        for (const [slot, itemName] of Object.entries(ldout)) {
            if (!itemName) continue;
            const inv = localInv.find(i => i.n === itemName && i.q > 0);
            if (!inv) continue;
            const it = getItemData(itemName);
            if (!it?.s) continue;
            if (!checkProficiency(it, 'player', itemName)) continue;
            addOp({t:'equip', item: itemName, slot, tgt: 'player'});
            localEq[slot] = itemName;
        }
        closeModal();
        haptic('medium');
        toast(`${vi('sword',13)} Loadout '${esc(name)}' aplicado`, 'ok');
        updateHeader();
        renderTab();
        updateBottomBar();
    }
