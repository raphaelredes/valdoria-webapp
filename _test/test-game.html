            return _originalAddEventListener.call(this, type, fn, opts);

        // Screen switching with slide animation
        function showScreen(screenId) {
            const screen = TEST_SCREENS[screenId];
            if (!screen) return;
            if (typeof animateScreenTransition === 'function') {
                animateScreenTransition(() => renderScreen(screen));
            } else {
                renderScreen(screen);
            }
        }

        // Transition test — show themed overlay then reset
        function testTransition(target) {
            const overlay = document.getElementById('transition-overlay');
            const config = _TRANSITION_THEMES[target] || _TRANSITION_THEMES.default;

            if (typeof stopParticles === 'function') stopParticles();

            overlay.className = 'transition-overlay';
            if (config.theme) overlay.classList.add(config.theme);
            overlay.style.display = '';
            requestAnimationFrame(() => overlay.classList.add('active'));

            // Reset after animation completes
            setTimeout(() => {
                overlay.classList.remove('active');
                setTimeout(() => {
                    overlay.style.display = 'none';
                    overlay.className = 'transition-overlay';
                    if (typeof initParticles === 'function') initParticles();
                    if (typeof updateParticleTheme === 'function' && S.currentScreen) {
                        updateParticleTheme(S.currentScreen.text || '');
                    }
                }, 300);
            }, config.duration + 200);
        }

        // Override doAction to log instead of making API calls

            if (cb === 'main_menu') {

                return;

            // Show a toast with the callback
