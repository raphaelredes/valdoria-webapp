<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1520">
    <title>TEST - Masmorra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=MedievalSharp&display=swap" rel="stylesheet">
    <script>
        window.Telegram = { WebApp: { ready(){}, expand(){}, disableVerticalSwipes(){}, BackButton: { show(){}, onClick(){} }, HapticFeedback: { impactOccurred(){} }, version: '7.0' } };
    </script>
    <script>
        var v = Date.now();
        document.write('<link rel="stylesheet" href="../valdoria-design.css?v=' + v + '">');
    </script>
    <style>
        * { scrollbar-width: none; -ms-overflow-style: none; box-sizing: border-box; margin: 0; padding: 0; }
        *::-webkit-scrollbar { display: none; }
        body { overflow: hidden; display: flex; flex-direction: column; touch-action: none; font-family: 'MedievalSharp', 'Cinzel', serif; background: #1a1520; }
        #loading { position: fixed; inset: 0; background: #1a1520; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; transition: opacity 0.6s ease; }
        #loading.hidden { opacity: 0; pointer-events: none; }
        .loading-text { color: #8a6a3a; font-size: 14px; font-family: 'Cinzel', serif; letter-spacing: 1px; }
        .loading-torch { width: 40px; height: 60px; position: relative; margin-bottom: 16px; }
        .torch-flame { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 16px; height: 24px; border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; background: radial-gradient(ellipse, #f0c040 0%, #e08020 50%, #c04020 100%); animation: flameFlicker 0.4s ease-in-out infinite alternate; box-shadow: 0 0 12px rgba(240,192,64,0.6), 0 0 24px rgba(224,128,32,0.3); }
        .torch-handle { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 6px; height: 28px; background: #5a4030; border-radius: 2px; }
        @keyframes flameFlicker { 0% { transform: translateX(-50%) scaleY(1) scaleX(1); } 50% { transform: translateX(-48%) scaleY(1.08) scaleX(0.95); } 100% { transform: translateX(-52%) scaleY(0.95) scaleX(1.05); } }
        #dungeon-hud { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: linear-gradient(180deg, #251a2a 0%, #1a1520 100%); border-bottom: 1px solid rgba(112, 66, 20, 0.3); z-index: 50; flex-shrink: 0; }
        .hud-dungeon-name { font-size: 14px; font-weight: 700; color: #c4953a; font-family: 'Cinzel', serif; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .hud-floor { font-size: 12px; color: #8a7060; font-family: 'Cinzel', serif; }
        #dungeon-map { flex: 1; overflow-y: auto; overflow-x: hidden; position: relative; background: radial-gradient(ellipse at 50% 30%, rgba(40, 30, 50, 0.5), transparent 70%), linear-gradient(180deg, #1a1520 0%, #15101a 100%); }
        #dungeon-map::after { content: ''; position: absolute; inset: 0; box-shadow: inset 0 0 60px 20px rgba(0, 0, 0, 0.6); pointer-events: none; z-index: 5; }
        #map-svg { display: block; width: 100%; }
        .node-group { cursor: pointer; transition: filter 0.2s ease; }
        .node-group:active { filter: brightness(1.2); }
        .node-bg { transition: fill 0.3s ease, stroke 0.3s ease; }
        .node-visited .node-bg { fill: #2a2030; stroke: #4a3a50; }
        .node-visited .node-icon { opacity: 0.5; }
        .node-visited .node-check { display: block; }
        .node-current .node-bg { fill: #3a2820; stroke: #c4953a; stroke-width: 2.5; }
        @keyframes nodeCurrentPulse { 0%, 100% { filter: drop-shadow(0 0 6px rgba(196, 149, 58, 0.3)); } 50% { filter: drop-shadow(0 0 14px rgba(196, 149, 58, 0.6)); } }
        .node-current { animation: nodeCurrentPulse 2s ease-in-out infinite; }
        .node-available .node-bg { fill: #25202a; stroke: #6a5a70; }
        @keyframes nodeShimmer { 0%, 100% { stroke-opacity: 0.5; } 50% { stroke-opacity: 1; } }
        .node-available .node-bg { animation: nodeShimmer 3s ease-in-out infinite; }
        .node-locked .node-bg { fill: #1a1520; stroke: #2a2030; }
        .node-locked .node-icon { opacity: 0.2; }
        .path-line { stroke: #3a3040; stroke-width: 2; fill: none; stroke-linecap: round; }
        .path-visited { stroke: #5a4a60; stroke-dasharray: none; }
        .path-available { stroke: #6a5a70; stroke-dasharray: 6 4; }
        @keyframes pathGlow { 0%, 100% { stroke-opacity: 0.4; } 50% { stroke-opacity: 0.8; } }
        .path-available { animation: pathGlow 2s ease-in-out infinite; }
        .path-locked { stroke: #2a2030; stroke-dasharray: 4 8; stroke-opacity: 0.3; }
        .node-icon { font-size: 18px; text-anchor: middle; dominant-baseline: central; pointer-events: none; }
        .node-check { display: none; fill: #6a8a5a; font-size: 10px; text-anchor: middle; }
        .node-label { fill: #8a7060; font-size: 9px; text-anchor: middle; pointer-events: none; font-family: 'Cinzel', serif; }
        #event-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; -webkit-backdrop-filter: blur(3px); backdrop-filter: blur(3px); }
        #event-overlay.open { display: flex; }
        .event-card { max-width: 360px; width: calc(100% - 32px); background: linear-gradient(180deg, #2a2030 0%, #1a1520 100%); border: 1px solid rgba(112, 66, 20, 0.3); border-radius: 8px; padding: 20px; animation: eventAppear 0.35s ease-out; }
        @keyframes eventAppear { from { opacity: 0; transform: translateY(16px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .event-icon { font-size: 36px; text-align: center; margin-bottom: 12px; }
        .event-title { font-size: 16px; font-weight: 700; color: #c4953a; text-align: center; margin-bottom: 8px; font-family: 'Cinzel', serif; }
        .event-desc { font-size: 13px; color: #d4c8b0; line-height: 1.5; text-align: center; margin-bottom: 16px; }
        .event-actions { display: flex; flex-direction: column; gap: 8px; }
        .event-btn { width: 100%; padding: 12px; border: 1px solid rgba(112, 66, 20, 0.3); border-radius: 4px; background: rgba(112, 66, 20, 0.15); color: #d4c8b0; font-size: 14px; font-family: 'Cinzel', serif; cursor: pointer; }
        .event-btn:active { opacity: 0.8; transform: scale(0.98); }
        .event-btn-primary { background: linear-gradient(135deg, #704214 0%, #5a3210 100%); border-color: #8a5a2a; color: #fff; }
        #boss-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0); z-index: 150; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #boss-overlay.open { display: flex; }
        @keyframes bossOverlayDarken { to { background: rgba(0, 0, 0, 0.75); } }
        @keyframes bossIconReveal { 0% { transform: scale(0); opacity: 0; } 50% { transform: scale(1.2); } 100% { transform: scale(1); opacity: 1; } }
        @keyframes bossNameGlow { from { opacity: 0; text-shadow: 0 0 0px transparent; } to { opacity: 1; text-shadow: 0 0 20px rgba(196, 149, 58, 0.5); } }
        @keyframes bossSlideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .boss-icon { font-size: 64px; opacity: 0; animation: bossIconReveal 0.6s ease 0.5s forwards; }
        .boss-name { font-size: 22px; font-weight: 700; color: #c4953a; font-family: 'Cinzel', serif; margin-top: 16px; opacity: 0; animation: bossNameGlow 0.4s ease 0.8s forwards; }
        .boss-subtitle { font-size: 13px; color: #8a7060; margin-top: 6px; opacity: 0; animation: bossSlideUp 0.3s ease 1s forwards; }
        .boss-btn { margin-top: 24px; padding: 14px 32px; background: linear-gradient(135deg, #7b2020 0%, #5a1010 100%); border: 1px solid #a04040; border-radius: 4px; color: #fff; font-size: 15px; font-weight: 700; font-family: 'Cinzel', serif; cursor: pointer; opacity: 0; animation: bossSlideUp 0.3s ease 1.2s forwards; }
        #dungeon-particles { position: fixed; inset: 0; pointer-events: none; z-index: 1; opacity: 0.6; }
        #bottom-bar { display: flex; gap: 8px; padding: 8px 12px; background: linear-gradient(0deg, #1a1520, #251a2a); border-top: 1px solid rgba(112, 66, 20, 0.2); z-index: 50; flex-shrink: 0; }
        .bar-btn { flex: 1; padding: 10px 4px; border: 1px solid rgba(112, 66, 20, 0.25); border-radius: 4px; background: rgba(112, 66, 20, 0.08); color: #d4c8b0; font-size: 12px; font-weight: 600; text-align: center; cursor: pointer; font-family: 'Cinzel', serif; }
        .bar-btn:active { opacity: 0.7; }
        .bar-btn-retreat { border-color: rgba(123, 32, 32, 0.3); color: #cc8888; }
        .v-toast-error { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #7b2020; color: #fff; padding: 8px 16px; border-radius: 4px; font-size: 13px; z-index: 300; }
        /* Test controls */
        .test-banner { position: fixed; top: 0; left: 0; right: 0; background: rgba(196, 149, 58, 0.15); color: #c4953a; font-size: 10px; text-align: center; padding: 2px 8px; z-index: 300; font-family: monospace; }
        .test-controls { position: fixed; top: 16px; right: 8px; z-index: 300; display: flex; flex-direction: column; gap: 4px; }
        .test-btn { padding: 4px 8px; font-size: 9px; background: rgba(196, 149, 58, 0.2); border: 1px solid rgba(196, 149, 58, 0.3); border-radius: 3px; color: #c4953a; cursor: pointer; font-family: monospace; }
    </style>
</head>
<body>
    <div class="test-banner">TEST MODE - Volcanic Dungeon</div>
    <div class="test-controls">
        <button class="test-btn" onclick="switchBiome('cave')">Cave</button>
        <button class="test-btn" onclick="switchBiome('volcanic')">Volcanic</button>
        <button class="test-btn" onclick="switchBiome('swamp')">Swamp</button>
        <button class="test-btn" onclick="switchBiome('crypt')">Crypt</button>
        <button class="test-btn" onclick="triggerBossReveal()">Boss!</button>
    </div>

    <div id="loading">
        <div class="loading-torch"><div class="torch-flame"></div><div class="torch-handle"></div></div>
        <div class="loading-text">Entrando na masmorra...</div>
    </div>

    <div id="dungeon-hud">
        <span class="hud-dungeon-name" id="hud-name">Masmorra</span>
        <span class="hud-floor" id="hud-floor">Andar 1</span>
    </div>

    <div id="dungeon-map">
        <svg id="map-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <canvas id="dungeon-particles"></canvas>

    <div id="event-overlay">
        <div class="event-card">
            <div class="event-icon" id="event-icon"></div>
            <div class="event-title" id="event-title"></div>
            <div class="event-desc" id="event-desc"></div>
            <div class="event-actions" id="event-actions"></div>
        </div>
    </div>

    <div id="boss-overlay">
        <div class="boss-icon" id="boss-icon"></div>
        <div class="boss-name" id="boss-name"></div>
        <div class="boss-subtitle" id="boss-subtitle"></div>
        <button class="boss-btn" id="boss-btn">Enfrentar</button>
    </div>

    <div id="bottom-bar">
        <button class="bar-btn" id="btn-inventory">Mochila</button>
        <button class="bar-btn bar-btn-retreat" id="btn-retreat">Recuar</button>
    </div>

    <!-- Block real DOMContentLoaded handler -->
    <script>
        var _originalAddEventListener = EventTarget.prototype.addEventListener;
        var _blockedInits = [];
        EventTarget.prototype.addEventListener = function(type, fn, opts) {
            if (type === 'DOMContentLoaded' && typeof fn === 'function') {
                _blockedInits.push(fn);
                return;
            }
            return _originalAddEventListener.call(this, type, fn, opts);
        };
    </script>

    <!-- Load real dungeon scripts -->
    <script>
        var v = Date.now();
        var scripts = ['dungeon-core.js', 'dungeon-map.js', 'dungeon-ui.js'];
        scripts.forEach(function(s) { document.write('<script src="../dungeon/' + s + '?v=' + v + '"><\/script>'); });
    </script>

    <!-- Inject test data and boot -->
    <script>
        EventTarget.prototype.addEventListener = _originalAddEventListener;

        // ═══════════════════════════════════════════════════
        // TEST FIXTURE: 12-node dungeon with branching paths
        // ═══════════════════════════════════════════════════
        const TEST_NODES = [
            { id: 0,  type: 'entrance',  label: 'Entrada',              visited: true,  current: false, available: false },
            { id: 1,  type: 'combat',    label: 'Sentinelas',           visited: true,  current: false, available: false },
            { id: 2,  type: 'trap',      label: 'Corredor Armadilhado', visited: true,  current: false, available: false },
            { id: 3,  type: 'treasure',  label: 'Sala do Tesouro',      visited: false, current: false, available: true },
            { id: 4,  type: 'mystery',   label: 'Sala Misteriosa',      visited: false, current: false, available: true },
            { id: 5,  type: 'campfire',  label: 'Fogueira',             visited: false, current: true,  available: false },
            { id: 6,  type: 'combat',    label: 'Horda de Esqueletos',  visited: false, current: false, available: true },
            { id: 7,  type: 'shrine',    label: 'Santuario Antigo',     visited: false, current: false, available: false },
            { id: 8,  type: 'lore',      label: 'Inscricoes Runicas',   visited: false, current: false, available: false },
            { id: 9,  type: 'combat',    label: 'Guardas da Cripta',    visited: false, current: false, available: false },
            { id: 10, type: 'trap',      label: 'Armadilha de Chamas',  visited: false, current: false, available: false },
            { id: 11, type: 'boss',      label: 'Lich Soberano',        visited: false, current: false, available: false },
        ];

        const TEST_PATHS = [
            [0, 1], [1, 2], [2, 5],
            [5, 3],         // branch left: treasure
            [5, 4],         // branch right: mystery
            [5, 6],         // straight: combat
            [3, 7],         // treasure -> shrine
            [4, 8],         // mystery -> lore
            [6, 9],         // combat -> more combat
            [7, 10],        // shrine -> trap
            [8, 10],        // lore -> same trap (merge)
            [9, 10],        // guards -> same trap (triple merge)
            [10, 11],       // trap -> BOSS
        ];

        S.dungeonId = 'test_dungeon_001';
        S.dungeonName = 'Cripta dos Reis Esquecidos';
        S.floor = 2;
        S.currentNode = 5;
        S.nodes = JSON.parse(JSON.stringify(TEST_NODES));
        S.paths = JSON.parse(JSON.stringify(TEST_PATHS));
        S.biome = 'volcanic';
        S.token = 'test-token';
        S.api = '';
        S.uid = 12345;

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('hud-name').textContent = S.dungeonName;
            document.getElementById('hud-floor').textContent = `Andar ${S.floor}`;
            renderDungeonMap();
            initDungeonParticles();
            setTimeout(() => document.getElementById('loading').classList.add('hidden'), 800);
            console.log('[TEST] Dungeon loaded:', S.nodes.length, 'nodes,', S.paths.length, 'paths, biome:', S.biome);
        });

        // Test controls
        function switchBiome(biome) {
            S.biome = biome;
            // Restart particles
            if (_dPartRaf) cancelAnimationFrame(_dPartRaf);
            _dParticles = [];
            initDungeonParticles();
            document.querySelector('.test-banner').textContent = 'TEST MODE - ' + biome.charAt(0).toUpperCase() + biome.slice(1) + ' Dungeon';
        }

        function triggerBossReveal() {
            const bossNode = S.nodes.find(n => n.type === 'boss');
            if (bossNode) showBossReveal(bossNode);
        }

        // Override sendAction to prevent API calls
        var _origSendAction = sendAction;
        sendAction = function(action, nodeId) {
            console.log('[TEST] sendAction blocked:', action, nodeId);
            alert('TEST: sendAction(' + action + ', ' + nodeId + ')');
            _actionSent = false;
            closeEvent();
        };
    </script>
</body>
</html>
