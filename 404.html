<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 - Lendas de Valdoria</title>
    <meta name="theme-color" content="#2b2830">
    <link rel="icon" type="image/svg+xml" href="/valdoria-webapp/favicon.svg">
    <link rel="stylesheet" href="/valdoria-webapp/valdoria-design.css?v=4">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 20px;
        }
        .lost-icon {
            font-size: 64px;
            margin-bottom: 16px;
            animation: v-fadeIn 0.5s ease;
        }
        .lost-title {
            font-size: 48px;
            font-weight: 900;
            color: var(--v-gold);
            text-shadow: 0 0 20px rgba(196, 149, 58, 0.4);
            margin-bottom: 8px;
        }
        .lost-subtitle {
            font-size: 16px;
            color: var(--v-text-dim);
            margin-bottom: 24px;
            max-width: 280px;
            line-height: 1.5;
        }
        .home-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            background: linear-gradient(135deg, var(--v-gold), var(--v-gold-dim));
            color: var(--v-bg);
            border: none;
            border-radius: var(--v-radius);
            font-size: 15px;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.15s ease;
            box-shadow: 0 3px 12px rgba(196, 149, 58, 0.3);
        }
        .home-btn:active { transform: scale(0.96); }
    </style>
</head>
<body>
    <div class="lost-icon">🗺️</div>
    <div class="lost-title">404</div>
    <div class="lost-subtitle">Aventureiro, parece que voce se perdeu nas terras de Valdoria...</div>
    <a href="/valdoria-webapp/" class="home-btn">🏰 Voltar ao Portal</a>
</body>
</html>
