        * { scrollbar-width: none; -ms-overflow-style: none; }

        body { display:flex; flex-direction:column; }

        /* ─── Header ─── */
        .wiki-header { padding:20px 16px 12px; text-align:center;
                       background:linear-gradient(180deg,#352f38 0%,var(--v-bg) 100%); position:relative; }
        .wiki-header::before { content:''; position:absolute; top:0; left:0; right:0; height:2px;
                               background:linear-gradient(90deg,transparent,var(--v-crimson),var(--v-gold),var(--v-crimson),transparent); }
        .wiki-header h1 { font-size:18px; color:var(--v-gold); letter-spacing:3px; text-transform:uppercase;
                          text-shadow:0 0 16px rgba(196,149,58,.4); font-weight:900; margin-bottom:4px; }
        .wiki-header .sub { font-size:11px; color:var(--v-text-dim); letter-spacing:1px; }

        /* ─── Search ─── */
        .search-wrap { padding:12px 16px 4px; }
        .search-wrap input { width:100%; padding:10px 14px; background:var(--v-bg-card); border:1px solid var(--v-border);
                             border-radius:var(--v-radius); color:var(--v-text); font-size:13px; outline:none; }
        .search-wrap input:focus { border-color:var(--v-gold-dim); }
        .search-wrap input::placeholder { color:var(--v-text-dim); }

        /* ─── Topic Grid ─── */
        .topics { padding:8px 16px 24px; display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        .topic-card { display:flex; flex-direction:column; align-items:center; text-align:center;
                      padding:18px 10px 14px; background:linear-gradient(165deg,var(--v-bg-card) 0%,#282430 100%);
                      border:1px solid var(--v-border); border-radius:var(--v-radius); cursor:pointer;
                      transition:all .25s ease; box-shadow:0 2px 8px rgba(0,0,0,.3); }
        .topic-card:active { transform:scale(.96); }
        .topic-card:hover  { border-color:var(--v-gold-dim); box-shadow:0 0 12px rgba(196,149,58,.12); }
        .topic-card.hidden { display:none; }
        .tc-icon { font-size:28px; margin-bottom:6px; }
        .tc-name { font-size:13px; font-weight:700; color:var(--v-text-bright); margin-bottom:3px; }
        .tc-desc { font-size:10px; color:var(--v-text-dim); line-height:1.3; }

        /* ─── Article View ─── */
        .article { display:none; padding:16px; animation:v-fadeIn .35s ease; }
        .article.active { display:block; }
        .article h2 { font-size:16px; color:var(--v-gold); margin:20px 0 8px; border-bottom:1px solid var(--v-border); padding-bottom:4px; }
        .article h2:first-child { margin-top:0; }
        .article h3 { font-size:14px; color:var(--v-silver); margin:14px 0 6px; }
        .article p  { font-size:13px; color:var(--v-text); line-height:1.6; margin:0 0 10px; }
        .article ul { margin:0 0 10px 18px; padding:0; }
        .article li { font-size:13px; color:var(--v-text); line-height:1.5; margin-bottom:4px; }
        .article code { background:var(--v-bg-accent); color:var(--v-gold); padding:1px 5px; border-radius:3px; font-size:12px; }
        .article pre { background:var(--v-bg-accent); border:1px solid var(--v-border); border-radius:var(--v-radius);
                       padding:12px; overflow-x:auto; margin:0 0 12px; }
        .article pre code { background:none; padding:0; color:var(--v-text); font-size:11px; line-height:1.5; }
        .article table { width:100%; border-collapse:collapse; margin:0 0 12px; font-size:12px; }
        .article th { background:var(--v-bg-accent); color:var(--v-gold); padding:6px 8px; text-align:left; border:1px solid var(--v-border); }
        .article td { padding:6px 8px; border:1px solid var(--v-border); color:var(--v-text); }
        .article .tag { display:inline-block; background:var(--v-bg-accent); color:var(--v-gold-dim); padding:2px 8px;

/* ═══════════════════════════════════════════════════════════════════
   AUTH — Telegram WebApp user verification
   ═══════════════════════════════════════════════════════════════════ */
const AUTHORIZED_IDS = [842486022];

const tg = window.Telegram?.WebApp;
const _vBg = getComputedStyle(document.documentElement).getPropertyValue('--v-bg').trim() || '#2b2830';

function initAuth() {
    if (!tg || !tg.initDataUnsafe?.user) {
        document.getElementById('gate-no-tg').style.display = 'flex';
        return false;
    }
    tg.ready(); tg.expand();
    tg.setHeaderColor(_vBg); tg.setBackgroundColor(_vBg);
    const uid = tg.initDataUnsafe.user.id;
    if (!AUTHORIZED_IDS.includes(uid)) {
        document.getElementById('gate-blocked').style.display = 'flex';
        return false;
    }
    document.getElementById('wiki-app').style.display = 'block';
    return true;
}

const $grid = document.getElementById('topics-grid');
const $mainView = document.getElementById('main-view');
const $articleView = document.getElementById('article-view');
const $articleTitle = document.getElementById('article-title');
const $articleBody = document.getElementById('article-body');

function renderGrid() {
    $grid.innerHTML = TOPICS.map(t =>
        `<div class="topic-card" data-id="${t.id}" data-search="${t.name.toLowerCase()} ${t.desc.toLowerCase()}" onclick="openTopic('${t.id}')">
            <div class="tc-icon">${t.icon}</div>
            <div class="tc-name">${t.name}</div>
            <div class="tc-desc">${t.desc}</div>
        </div>`
    ).join('');
}

function filterTopics(query) {
    const q = query.toLowerCase().trim();
    document.querySelectorAll('.topic-card').forEach(card => {
        card.classList.toggle('hidden', q && !card.dataset.search.includes(q));
    });
}

function openTopic(id) {
    const topic = TOPICS.find(t => t.id === id);
    if (!topic) return;
    $articleTitle.textContent = topic.icon + ' ' + topic.name;
    $articleBody.innerHTML = topic.body;
    $mainView.style.display = 'none';
    $articleView.style.display = 'block';
    window.scrollTo(0, 0);
    if (tg) tg.BackButton.show();
}

function showMain() {
    $articleView.style.display = 'none';
    $mainView.style.display = 'block';
    window.scrollTo(0, 0);
    if (tg) tg.BackButton.hide();
}

// Telegram back button integration
if (tg) tg.BackButton.onClick(() => {
    if ($articleView.style.display !== 'none') showMain();
});

// ─── Init ───
