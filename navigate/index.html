<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2a2420">
    <title>Mapa do Mundo - Lendas de Valdoria</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cinzel+Decorative:wght@700&family=MedievalSharp&family=IM+Fell+English:ital@0;1&family=Pirata+One&family=Almendra:wght@400;700&family=Metamorphous&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        var v = Date.now();
        document.write('<link rel="stylesheet" href="../valdoria-design.css?v=' + v + '">');
    </script>
    <style>
        /* --- SCROLLBAR HIDING (redundancy for valdoria-design.css) --- */
        * {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        *::-webkit-scrollbar {
            display: none;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            overflow: hidden;
            display: flex;
            flex-direction: column;
            touch-action: none;
            font-family: 'MedievalSharp', 'Cinzel', serif;
        }

        /* ═══ LOADING (walking traveler scene) ═══ */
        #loading {
            position: fixed;
            inset: 0;
            background: #2a2420;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            transition: opacity 0.8s ease;
            overflow: hidden;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* --- Parallax landscape scene --- */
        .load-scene {
            position: absolute;
            inset: 0;
            overflow: hidden;
        }

        /* Sky gradient */
        .load-sky {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg,
                #1a1510 0%,
                #2a2018 30%,
                #3a2e1e 55%,
                #4a3a22 75%,
                #5a4428 100%
            );
        }

        /* Stars */
        .load-stars {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 45%;
            opacity: 0.6;
        }

        .load-star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #d4c8b0;
            border-radius: 50%;
            animation: starTwinkle 3s ease-in-out infinite;
        }

        @keyframes starTwinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Moon */
        .load-moon {
            position: absolute;
            top: 12%;
            right: 18%;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, #e8dcc4 0%, #c4b896 60%, #a09070 100%);
            box-shadow: 0 0 20px rgba(228, 220, 196, 0.15), 0 0 60px rgba(228, 220, 196, 0.06);
            animation: moonGlow 4s ease-in-out infinite;
        }

        @keyframes moonGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(228,220,196,0.15), 0 0 60px rgba(228,220,196,0.06); }
            50% { box-shadow: 0 0 28px rgba(228,220,196,0.22), 0 0 80px rgba(228,220,196,0.08); }
        }

        /* Far mountains (parallax layer 1) */
        .load-mountains-far {
            position: absolute;
            bottom: 32%;
            left: 0;
            right: 0;
            height: 25%;
            animation: parallaxFar 12s linear infinite;
        }

        @keyframes parallaxFar {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* Near hills (parallax layer 2) */
        .load-hills {
            position: absolute;
            bottom: 22%;
            left: 0;
            right: 0;
            height: 18%;
            animation: parallaxNear 8s linear infinite;
        }

        @keyframes parallaxNear {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* Ground plane */
        .load-ground {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 28%;
            background: linear-gradient(180deg, #3a2e1e 0%, #2e2418 40%, #241c12 100%);
        }

        /* Road/path on the ground — visible dirt road */
        .load-road {
            position: absolute;
            top: 0;
            left: 15%;
            right: 15%;
            height: 100%;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(90, 68, 34, 0.25) 20%,
                rgba(100, 78, 40, 0.35) 50%,
                rgba(90, 68, 34, 0.25) 80%,
                transparent 100%
            );
        }

        /* Road edge lines */
        .load-road::before,
        .load-road::after {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            width: 1px;
            background: rgba(112, 66, 20, 0.15);
        }

        .load-road::before { left: 0; }
        .load-road::after { right: 0; }

        /* Dust particles */
        .load-dust {
            position: absolute;
            bottom: 18%;
            left: 0;
            right: 0;
            height: 12%;
            overflow: hidden;
        }

        .dust-p {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(160, 140, 100, 0.25);
            border-radius: 50%;
            animation: dustFloat 6s linear infinite;
        }

        @keyframes dustFloat {
            0% { transform: translate(0, 0) scale(1); opacity: 0; }
            15% { opacity: 0.4; }
            85% { opacity: 0.2; }
            100% { transform: translate(-120px, -30px) scale(0.3); opacity: 0; }
        }

        /* --- Walking traveler (center) --- */
        .load-traveler {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            filter: drop-shadow(0 4px 14px rgba(0,0,0,0.7));
        }

        /* === SVG JOINT-BASED WALK (Andrew Hoyer technique) ===
         * Single SVG with nested <g> groups at each joint pivot.
         * CSS animations rotate each joint; child joints inherit parent rotation.
         * transform-box: view-box ensures pixel-accurate pivots in SVG coords.
         *
         * Bone chain: hip > thigh > knee > shin > boot
         *             shoulder > upper arm > elbow > forearm
         *
         * Walk cycle: 1.0s, 8-phase asymmetric (Contact→Down→Passing→High ×2)
         * Physics: pendulum beziers for hips, spring for knees, overshoot for arms.
         * Disney principles: overlapping action via staggered animation-delay.
         * Cape: 3 nested segments with wave propagation (2.3s async period).
         */
        .walk-figure {
            position: relative;
            width: 120px;
            height: 168px;
        }

        .walk-figure svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        /* All animated SVG elements use viewBox as transform reference */
        .walk-figure [class^="wk-"] {
            transform-box: view-box;
        }

        /* --- Body bounce (vertical + lateral weight shift + forward lean) --- */
        .wk-bounce {
            animation: wkBounce 1.0s cubic-bezier(0.35, 0.0, 0.65, 1.0) infinite;
            transform-origin: 34px 52px;
        }
        @keyframes wkBounce {
            0%, 100%  { transform: translateY(1.5px) translateX(0.4px) rotate(1.2deg); }
            15%       { transform: translateY(2.5px) translateX(0.6px) rotate(1.2deg); }
            35%       { transform: translateY(-0.5px) translateX(0px) rotate(1.2deg); }
            45%       { transform: translateY(-1px) translateX(-0.2px) rotate(1.2deg); }
            50%       { transform: translateY(1.5px) translateX(-0.4px) rotate(1.2deg); }
            65%       { transform: translateY(2.5px) translateX(-0.6px) rotate(1.2deg); }
            85%       { transform: translateY(-0.5px) translateX(0px) rotate(1.2deg); }
            95%       { transform: translateY(-1px) translateX(0.2px) rotate(1.2deg); }
        }

        /* --- Head bob (60% of body amplitude, vestibular compensation) --- */
        .wk-head {
            animation: wkHead 1.0s cubic-bezier(0.35, 0.0, 0.65, 1.0) infinite;
            animation-delay: -0.02s;
        }
        @keyframes wkHead {
            0%, 100%  { transform: translateY(0.9px) rotate(0deg); }
            15%       { transform: translateY(1.5px) rotate(0.5deg); }
            35%       { transform: translateY(-0.3px) rotate(-0.3deg); }
            45%       { transform: translateY(-0.6px) rotate(-0.5deg); }
            50%       { transform: translateY(0.9px) rotate(0deg); }
            65%       { transform: translateY(1.5px) rotate(0.5deg); }
            85%       { transform: translateY(-0.3px) rotate(-0.3deg); }
            95%       { transform: translateY(-0.6px) rotate(-0.5deg); }
        }

        /* --- Cape (3-segment wave propagation, async period) --- */
        .wk-cape-1 {
            transform-origin: 25px 24px;
            animation: wkCape1 2.3s ease-in-out infinite;
        }
        .wk-cape-2 {
            transform-origin: 20px 40px;
            animation: wkCape2 2.3s ease-in-out infinite;
            animation-delay: -0.02s;
        }
        .wk-cape-3 {
            transform-origin: 17px 56px;
            animation: wkCape3 2.3s ease-in-out infinite;
            animation-delay: -0.04s;
        }
        @keyframes wkCape1 {
            0%, 100% { transform: rotate(0deg); }
            25%      { transform: rotate(2deg); }
            50%      { transform: rotate(-1deg); }
            75%      { transform: rotate(1.5deg); }
        }
        @keyframes wkCape2 {
            0%, 100% { transform: rotate(0deg) skewY(0deg); }
            20%      { transform: rotate(3deg) skewY(1deg); }
            50%      { transform: rotate(-2deg) skewY(-0.5deg); }
            80%      { transform: rotate(2deg) skewY(0.8deg); }
        }
        @keyframes wkCape3 {
            0%, 100% { transform: rotate(0deg) skewY(0deg) scaleX(1); }
            15%      { transform: rotate(5deg) skewY(2deg) scaleX(1.04); }
            45%      { transform: rotate(-3deg) skewY(-1deg) scaleX(0.96); }
            70%      { transform: rotate(4deg) skewY(1.5deg) scaleX(1.02); }
        }

        /* === RIGHT LEG (front, full opacity) === */
        .wk-hip-r {
            transform-origin: 34px 52px;
            animation: wkHipR 1.0s cubic-bezier(0.35, 0.0, 0.65, 1.0) infinite;
        }
        @keyframes wkHipR {
            0%, 100%  { transform: rotate(-25deg); }
            15%       { transform: rotate(-12deg); }
            35%       { transform: rotate(12deg); }
            45%       { transform: rotate(22deg); }
            50%       { transform: rotate(25deg); }
            65%       { transform: rotate(12deg); }
            85%       { transform: rotate(-12deg); }
            95%       { transform: rotate(-22deg); }
        }

        .wk-knee-r {
            transform-origin: 34px 72px;
            animation: wkKneeR 1.0s cubic-bezier(0.23, 1.0, 0.32, 1.0) infinite;
        }
        @keyframes wkKneeR {
            0%, 100%  { transform: rotate(12deg); }
            15%       { transform: rotate(22deg); }
            35%       { transform: rotate(3deg); }
            45%       { transform: rotate(0deg); }
            50%       { transform: rotate(5deg); }
            65%       { transform: rotate(30deg); }
            85%       { transform: rotate(40deg); }
            95%       { transform: rotate(18deg); }
        }

        /* === LEFT LEG (back, dimmer) === */
        .wk-hip-l {
            transform-origin: 34px 52px;
            animation: wkHipL 1.0s cubic-bezier(0.35, 0.0, 0.65, 1.0) infinite;
            animation-delay: -0.01s;
        }
        @keyframes wkHipL {
            0%, 100%  { transform: rotate(25deg); }
            15%       { transform: rotate(12deg); }
            35%       { transform: rotate(-12deg); }
            45%       { transform: rotate(-22deg); }
            50%       { transform: rotate(-25deg); }
            65%       { transform: rotate(-12deg); }
            85%       { transform: rotate(12deg); }
            95%       { transform: rotate(22deg); }
        }

        .wk-knee-l {
            transform-origin: 34px 72px;
            animation: wkKneeL 1.0s cubic-bezier(0.23, 1.0, 0.32, 1.0) infinite;
            animation-delay: -0.01s;
        }
        @keyframes wkKneeL {
            0%, 100%  { transform: rotate(5deg); }
            15%       { transform: rotate(30deg); }
            35%       { transform: rotate(40deg); }
            45%       { transform: rotate(18deg); }
            50%       { transform: rotate(12deg); }
            65%       { transform: rotate(22deg); }
            85%       { transform: rotate(3deg); }
            95%       { transform: rotate(0deg); }
        }

        /* === RIGHT ARM (front, swings OPPOSITE to right leg) === */
        .wk-shoulder-r {
            transform-origin: 37px 22px;
            animation: wkShoulderR 1.0s cubic-bezier(0.175, 0.885, 0.32, 1.275) infinite;
            animation-delay: -0.02s;
        }
        @keyframes wkShoulderR {
            0%, 100%  { transform: rotate(18deg); }
            15%       { transform: rotate(10deg); }
            35%       { transform: rotate(-8deg); }
            45%       { transform: rotate(-16deg); }
            50%       { transform: rotate(-18deg); }
            65%       { transform: rotate(-10deg); }
            85%       { transform: rotate(8deg); }
            95%       { transform: rotate(16deg); }
        }

        .wk-elbow-r {
            transform-origin: 37px 36px;
            animation: wkElbowR 1.0s cubic-bezier(0.23, 1.0, 0.32, 1.0) infinite;
            animation-delay: -0.04s;
        }
        @keyframes wkElbowR {
            0%, 100%  { transform: rotate(-10deg); }
            25%       { transform: rotate(-30deg); }
            50%       { transform: rotate(-8deg); }
            75%       { transform: rotate(-30deg); }
        }

        /* === LEFT ARM (back, swings OPPOSITE to left leg) === */
        .wk-shoulder-l {
            transform-origin: 31px 22px;
            animation: wkShoulderL 1.0s cubic-bezier(0.175, 0.885, 0.32, 1.275) infinite;
            animation-delay: -0.015s;
        }
        @keyframes wkShoulderL {
            0%, 100%  { transform: rotate(-18deg); }
            15%       { transform: rotate(-10deg); }
            35%       { transform: rotate(8deg); }
            45%       { transform: rotate(16deg); }
            50%       { transform: rotate(18deg); }
            65%       { transform: rotate(10deg); }
            85%       { transform: rotate(-8deg); }
            95%       { transform: rotate(-16deg); }
        }

        .wk-elbow-l {
            transform-origin: 31px 36px;
            animation: wkElbowL 1.0s cubic-bezier(0.23, 1.0, 0.32, 1.0) infinite;
            animation-delay: -0.035s;
        }
        @keyframes wkElbowL {
            0%, 100%  { transform: rotate(-8deg); }
            25%       { transform: rotate(-30deg); }
            50%       { transform: rotate(-10deg); }
            75%       { transform: rotate(-30deg); }
        }



        /* --- Eye glow pulse (very subtle ember flicker) --- */
        .wk-eye {
            animation: wkEye 3.2s ease-in-out infinite;
        }
        @keyframes wkEye {
            0%, 100% { opacity: 0.12; }
            30%      { opacity: 0.2; }
            60%      { opacity: 0.1; }
        }

        /* --- Boot rotation (foot roll: heel→flat→toe) --- */
        .wk-boot-r {
            transform-origin: 33px 95px;
            animation: wkBootR 1.0s cubic-bezier(0.35, 0.0, 0.65, 1.0) infinite;
        }
        @keyframes wkBootR {
            0%, 100%  { transform: rotate(10deg); }   /* heel strike */
            15%       { transform: rotate(4deg); }     /* weight absorb */
            35%       { transform: rotate(0deg); }     /* flat */
            45%       { transform: rotate(-15deg); }   /* toe push-off */
            50%       { transform: rotate(0deg); }     /* swing neutral */
            65%       { transform: rotate(0deg); }
            85%       { transform: rotate(5deg); }     /* preparing contact */
            95%       { transform: rotate(8deg); }
        }
        .wk-boot-l {
            transform-origin: 33px 95px;
            animation: wkBootL 1.0s cubic-bezier(0.35, 0.0, 0.65, 1.0) infinite;
            animation-delay: -0.01s;
        }
        @keyframes wkBootL {
            0%, 100%  { transform: rotate(0deg); }     /* swing neutral */
            15%       { transform: rotate(0deg); }
            35%       { transform: rotate(5deg); }     /* preparing */
            45%       { transform: rotate(8deg); }
            50%       { transform: rotate(10deg); }    /* heel strike */
            65%       { transform: rotate(4deg); }     /* weight absorb */
            85%       { transform: rotate(0deg); }     /* flat */
            95%       { transform: rotate(-15deg); }   /* toe push-off */
        }

        /* --- Tunic hem sway (lower tunic edge moves with walk) --- */
        .wk-hem {
            transform-origin: 32px 56px;
            animation: wkHem 1.0s cubic-bezier(0.35, 0.0, 0.65, 1.0) infinite;
            animation-delay: -0.03s;
        }
        @keyframes wkHem {
            0%, 100%  { transform: skewX(-2deg); }
            25%       { transform: skewX(3deg); }
            50%       { transform: skewX(2deg); }
            75%       { transform: skewX(-3deg); }
        }

        /* --- Hood tip flap (secondary motion on hood peak) --- */
        .wk-hood-tip {
            transform-origin: 30px 4px;
            animation: wkHoodTip 2.3s ease-in-out infinite;
            animation-delay: -0.03s;
        }
        @keyframes wkHoodTip {
            0%, 100% { transform: rotate(0deg); }
            20%      { transform: rotate(3deg); }
            50%      { transform: rotate(-2deg); }
            80%      { transform: rotate(2deg); }
        }

        /* --- Ground shadow (static, anchors character to ground) --- */
        .wk-ground-shadow {
            /* No animation — stays fixed on the ground */
        }

        /* --- Breathing pulse (subtle torso expansion, independent of walk) --- */
        .wk-breath {
            transform-origin: 32px 40px;
            animation: wkBreath 3.5s ease-in-out infinite;
        }
        @keyframes wkBreath {
            0%, 100% { transform: scaleX(1) scaleY(1); }
            40%      { transform: scaleX(1.012) scaleY(1.008); }
            60%      { transform: scaleX(1.01) scaleY(1.006); }
        }


        /* --- Cape rim light (moonlight edge highlight) --- */
        .wk-cape-rim {
            animation: wkCapeRim 2.3s ease-in-out infinite;
        }
        @keyframes wkCapeRim {
            0%, 100% { opacity: 0.12; }
            25%      { opacity: 0.18; }
            50%      { opacity: 0.08; }
            75%      { opacity: 0.15; }
        }

        /* --- Dust kick particles (foot impact) --- */
        .wk-dust {
            animation: wkDust 1.0s ease-out infinite;
        }
        @keyframes wkDust {
            0%        { opacity: 0; transform: translate(0, 0) scale(1); }
            10%       { opacity: 0.3; }
            15%       { opacity: 0.25; transform: translate(-3px, -2px) scale(0.8); }
            30%       { opacity: 0.1; transform: translate(-6px, -5px) scale(0.4); }
            40%, 100% { opacity: 0; transform: translate(-8px, -7px) scale(0.2); }
        }
        .wk-dust-2 {
            animation: wkDust2 1.0s ease-out infinite;
        }
        @keyframes wkDust2 {
            0%, 49%   { opacity: 0; transform: translate(0, 0) scale(1); }
            55%       { opacity: 0; }
            60%       { opacity: 0.3; }
            65%       { opacity: 0.25; transform: translate(-3px, -2px) scale(0.8); }
            80%       { opacity: 0.1; transform: translate(-6px, -5px) scale(0.4); }
            90%, 100% { opacity: 0; transform: translate(-8px, -7px) scale(0.2); }
        }

        /* --- Foreground trees (silhouettes) --- */
        .load-trees-fg {
            position: absolute;
            bottom: 22%;
            left: 0;
            right: 0;
            height: 30%;
            animation: parallaxTrees 6s linear infinite;
            z-index: 5;
        }

        @keyframes parallaxTrees {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* --- Compass overlay (subtle, top area) --- */
        .load-compass-overlay {
            position: absolute;
            top: 8%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0.12;
            animation: compassFade 4s ease-in-out infinite;
            z-index: 2;
        }

        @keyframes compassFade {
            0%, 100% { opacity: 0.08; }
            50% { opacity: 0.16; }
        }

        .load-compass-overlay svg {
            width: 80px;
            height: 80px;
            animation: compassRotate 20s linear infinite;
        }

        @keyframes compassRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* --- Loading text (bottom) --- */
        .load-text-area {
            position: absolute;
            bottom: 6%;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 20;
        }

        .loading-text {
            color: #c4953a;
            font-size: 14px;
            font-family: 'Cinzel', serif;
            letter-spacing: 1.5px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.6);
            animation: textPulse 2s ease-in-out infinite;
        }

        .loading-dots::after {
            content: '';
            animation: loadDots 1.5s steps(3, end) infinite;
        }

        @keyframes loadDots {
            0% { content: ''; }
            33% { content: '.'; }
            66% { content: '..'; }
            100% { content: '...'; }
        }

        @keyframes textPulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        /* --- Vignette overlay --- */
        .load-vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(20,16,10,0.6) 100%);
            z-index: 15;
            pointer-events: none;
        }

        /* --- Parchment border flourish --- */
        .load-border {
            position: absolute;
            inset: 8px;
            border: 1px solid rgba(196, 149, 58, 0.08);
            border-radius: 2px;
            z-index: 16;
            pointer-events: none;
        }

        .load-border::before,
        .load-border::after {
            content: '✦';
            position: absolute;
            color: rgba(196, 149, 58, 0.12);
            font-size: 10px;
        }

        .load-border::before { top: -1px; left: 50%; transform: translateX(-50%); }
        .load-border::after { bottom: -1px; left: 50%; transform: translateX(-50%); }

        /* ═══ HUD (top bar) ═══ */
        #hud {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: linear-gradient(180deg, #3a3028 0%, #2a2420 100%);
            border-bottom: 1px solid rgba(112, 66, 20, 0.4);
            z-index: 50;
            flex-shrink: 0;
        }

        .hud-name {
            font-size: 13px;
            font-weight: 700;
            color: #c4953a;
            max-width: 90px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-family: 'Cinzel', serif;
        }

        .hud-level {
            font-size: 11px;
            color: #8a7060;
            margin-right: auto;
            font-family: 'Cinzel', serif;
        }

        .hud-bar-group {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .hud-bar {
            width: 50px;
            height: 7px;
            background: #1a1510;
            border-radius: 2px;
            overflow: hidden;
            border: 1px solid #3a3028;
        }

        .hud-bar-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.4s ease;
        }

        .hp-fill {
            background: linear-gradient(90deg, #7b2020, #a03030);
        }

        .mp-fill {
            background: linear-gradient(90deg, #204080, #3060b0);
        }

        .hud-bar-label {
            font-size: 10px;
            color: #8a7060;
            min-width: 16px;
            font-family: 'Cinzel', serif;
        }

        /* ═══ MAP VIEWPORT ═══ */
        #map-viewport {
            flex: 1;
            overflow: hidden;
            position: relative;
            background: #2a2420;
        }

        /* Parchment vignette overlay */
        #map-viewport::after {
            content: '';
            position: absolute;
            inset: 0;
            box-shadow: inset 0 0 60px 20px rgba(20, 16, 10, 0.5);
            pointer-events: none;
            z-index: 30;
        }

        #map-wrapper {
            position: absolute;
            transform-origin: 0 0;
            will-change: transform;
        }

        #map-svg {
            display: block;
        }

        /* ═══ LOCATION INFO PANEL (parchment scroll) ═══ */
        #info-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 430px;
            margin: 0 auto;
            background: linear-gradient(180deg, #3a3028 0%, #2a2420 100%);
            border-top: 2px solid #704214;
            border-radius: 4px 4px 0 0;
            padding: 12px 16px 14px;
            z-index: 100;
            transform: translateY(100%);
            transition: transform 0.35s ease-out;
            max-height: 55vh;
            overflow-y: auto;
            /* Parchment inner shadow (aged scroll edges) */
            box-shadow:
                inset 0 4px 16px rgba(40, 30, 15, 0.5),
                inset 0 -2px 8px rgba(40, 30, 15, 0.3),
                0 -4px 20px rgba(0, 0, 0, 0.4);
        }

        #info-panel.open {
            transform: translateY(0);
        }

        /* Scroll roll top edge */
        #info-panel::before {
            content: '';
            position: absolute;
            top: -3px;
            left: 10px;
            right: 10px;
            height: 6px;
            background: radial-gradient(ellipse at center, #4a3a28 0%, #3a3028 50%, transparent 100%);
            border-radius: 50%;
        }

        .info-handle {
            width: 36px;
            height: 3px;
            background: rgba(112, 66, 20, 0.4);
            border-radius: 1px;
            margin: 0 auto 10px;
        }

        .info-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .info-icon {
            font-size: 28px;
            line-height: 1;
        }

        .info-title {
            font-size: 17px;
            font-weight: 700;
            color: #c4953a;
            flex: 1;
            font-family: 'Cinzel Decorative', 'Cinzel', serif;
        }

        .info-danger {
            font-size: 14px;
            padding: 3px 10px;
            border-radius: 3px;
            background: rgba(60, 30, 20, 0.6);
            border: 1px solid rgba(123, 32, 32, 0.4);
            color: #e0a0a0;
            white-space: nowrap;
            letter-spacing: -1px;
            flex-shrink: 0;
        }

        .info-biome {
            font-size: 13px;
            color: #8a7060;
            margin-bottom: 6px;
            font-family: 'MedievalSharp', serif;
        }

        .info-desc {
            font-size: 14px;
            color: #d4c8b0;
            line-height: 1.5;
            margin-bottom: 8px;
            font-style: italic;
            opacity: 0.9;
            font-family: 'MedievalSharp', serif;
        }

        .info-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
        }

        .info-tag {
            font-size: 12px;
            color: #8a7060;
            background: rgba(112, 66, 20, 0.12);
            padding: 3px 8px;
            border-radius: 3px;
            border: 1px solid rgba(112, 66, 20, 0.15);
            font-family: 'MedievalSharp', serif;
        }

        .info-tag-warn {
            color: #cc9944;
            background: rgba(180, 130, 40, 0.1);
            border-color: rgba(180, 130, 40, 0.2);
        }

        .info-tag-danger {
            color: #cc6666;
            background: rgba(160, 50, 50, 0.1);
            border-color: rgba(160, 50, 50, 0.2);
        }

        .info-quests,
        .info-dungeons {
            font-size: 13px;
            color: #8a7060;
            margin-bottom: 6px;
            font-family: 'MedievalSharp', serif;
        }

        .info-quests span,
        .info-dungeons span {
            color: #d4c8b0;
        }

        .info-note {
            display: none;
            font-size: 13px;
            color: #8a7060;
            text-align: center;
            padding: 6px 0;
            font-style: italic;
            font-family: 'MedievalSharp', serif;
        }

        .info-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
        }

        .info-btn {
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            color: #fff;
            text-align: center;
            transition: opacity 0.15s, transform 0.15s;
            font-family: 'Cinzel', serif;
        }

        /* Leather-textured travel button */
        .info-btn-travel {
            background: linear-gradient(135deg, #704214 0%, #5a3210 50%, #6a3a12 100%);
            border: 1px solid #8a5a2a;
            box-shadow: inset 0 1px 0 rgba(255, 200, 100, 0.15), inset 0 -1px 0 rgba(0, 0, 0, 0.2);
        }

        .info-btn-risky {
            background: linear-gradient(135deg, #5a2a0a 0%, #4a1a00 50%, #5a2a0a 100%);
            border: 1px solid #8a4a1a;
            box-shadow: inset 0 1px 0 rgba(255, 150, 50, 0.1), inset 0 -1px 0 rgba(0, 0, 0, 0.3);
        }

        .info-btn-explore {
            background: linear-gradient(135deg, #2a5a1a 0%, #1a4a10 50%, #2a5a1a 100%);
            border: 1px solid #4a7a3a;
            box-shadow: inset 0 1px 0 rgba(100, 200, 100, 0.1), inset 0 -1px 0 rgba(0, 0, 0, 0.2);
        }

        .info-btn-camp {
            background: linear-gradient(135deg, #5a4a20 0%, #4a3a18 50%, #5a4a20 100%);
            border: 1px solid #7a6a3a;
            box-shadow: inset 0 1px 0 rgba(200, 180, 100, 0.1), inset 0 -1px 0 rgba(0, 0, 0, 0.2);
        }

        .info-btn-close {
            background: rgba(112, 66, 20, 0.15);
            color: #8a7060;
            font-weight: 500;
            font-size: 13px;
            padding: 10px 16px;
            border: 1px solid rgba(112, 66, 20, 0.2);
        }

        .info-btn:active {
            opacity: 0.8;
            transform: scale(0.98);
        }

        /* ═══ BOTTOM BAR ═══ */
        #bottom-bar {
            display: flex;
            gap: 8px;
            padding: 8px 12px;
            background: linear-gradient(0deg, #2a2420, #3a3028);
            border-top: 1px solid rgba(112, 66, 20, 0.3);
            z-index: 60;
            flex-shrink: 0;
        }

        .bar-btn {
            flex: 1;
            padding: 10px 4px;
            border: 1px solid rgba(112, 66, 20, 0.3);
            border-radius: 4px;
            background: rgba(112, 66, 20, 0.1);
            color: #d4c8b0;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            font-family: 'Cinzel', serif;
        }

        .bar-btn:active {
            opacity: 0.7;
        }

        .bar-btn-return {
            border-color: rgba(196, 149, 58, 0.3);
            color: #c4953a;
        }

        /* ═══ MAP ELEMENTS — Medieval Cartography ═══ */
        .loc-node {
            cursor: pointer;
            transition: filter 0.2s ease, opacity 0.2s ease;
        }

        .loc-node:hover {
            opacity: 0.75;
        }

        .loc-node.current {
            /* No glow — hand-drawn style uses double ink circle instead */
        }

        .loc-node.frontier {
            opacity: 0.35;
        }

        .loc-node.hidden {
            display: none;
        }

        .loc-label {
            font-size: 9.5px;
            fill: #d4c8b0;
            fill-opacity: 0.85;
            text-anchor: middle;
            pointer-events: none;
            font-family: 'Cinzel', serif;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        /* Ink road paths */
        .road-path {
            stroke: #8a6a3a;
            stroke-linecap: round;
        }

        .road-path.active {
            stroke: #a08050;
        }

        .terrain-illust {
            pointer-events: none;
        }

        /* ═══ PLAYER MARKER — Banner sway ═══ */
        @keyframes bannerBob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-2px); }
        }

        .player-marker {
            animation: bannerBob 3s ease-in-out infinite;
        }

        /* ═══ LOCATION NODES — Float, hover, shake ═══ */
        @keyframes locFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-2px); }
        }
        @keyframes locShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-2px); }
            40% { transform: translateX(2px); }
            60% { transform: translateX(-1px); }
            80% { transform: translateX(1px); }
        }

        .loc-node.explored, .loc-node.known_mapped {
            animation: locFloat 4s ease-in-out infinite;
        }
        .loc-node.explored:nth-child(odd) { animation-delay: -1s; }
        .loc-node.explored:nth-child(3n) { animation-delay: -2.5s; }

        .loc-node.explored:hover, .loc-node.known_mapped:hover {
            opacity: 0.7;
            animation: none;
        }
        .loc-node.frontier:active, .loc-node.known_unmapped:not([style*="cursor"]):active {
            animation: locShake 0.3s ease;
        }

        /* ═══ TRAVEL ANIMATION — Path drawing + marker ═══ */
        @keyframes travelPathDraw {
            to { stroke-dashoffset: 0; }
        }
        @keyframes travelMarkerBounce {
            0% { transform: scale(1); }
            40% { transform: scale(1.25); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }
        .travel-path-anim {
            stroke: #c4953a;
            stroke-width: 3;
            stroke-linecap: round;
            fill: none;
            stroke-opacity: 0.8;
        }
        .travel-marker {
            transition: transform 0.05s linear;
        }
        .travel-marker-bounce {
            animation: travelMarkerBounce 0.3s ease;
        }

        /* ═══ FOG REVEAL — Expanding light ═══ */
        @keyframes fogRevealExpand {
            from { r: 0; opacity: 0.8; }
            to { r: 40; opacity: 0; }
        }
        .fog-reveal-burst {
            animation: fogRevealExpand 0.8s ease-out forwards;
            fill: rgba(196, 149, 58, 0.3);
            pointer-events: none;
        }

        /* ═══ SELECTION RING — Pulse ═══ */
        @keyframes selectionPulse {
            0%, 100% { stroke-opacity: 0.6; }
            50% { stroke-opacity: 0.3; }
        }
        .selection-ring {
            animation: selectionPulse 2s ease-in-out infinite;
        }

        /* ═══ PATH HIGHLIGHT — Animated dash ═══ */
        @keyframes pathDashFlow {
            to { stroke-dashoffset: -20; }
        }
        .path-highlight {
            stroke-dasharray: 6 4;
            animation: pathDashFlow 1s linear infinite;
        }

        /* ═══ CURRENT LOCATION BADGE ═══ */
        #current-loc-badge {
            position: absolute;
            top: 8px;
            left: 12px;
            right: 12px;
            background: rgba(42, 36, 32, 0.92);
            border: 1px solid rgba(112, 66, 20, 0.3);
            border-radius: 4px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #d4c8b0;
            z-index: 40;
            pointer-events: none;
            font-family: 'Cinzel', serif;
            box-shadow: inset 0 1px 4px rgba(40, 30, 15, 0.3);
        }

        #current-loc-badge .badge-icon {
            font-size: 18px;
        }

        #current-loc-badge .badge-name {
            font-weight: 700;
            color: #c4953a;
            font-size: 13px;
            font-family: 'Cinzel Decorative', 'Cinzel', serif;
        }

        #current-loc-badge .badge-info {
            margin-left: auto;
            font-size: 11px;
            color: #8a7060;
        }

        /* ═══ LEGEND (cartographic style) ═══ */
        #legend {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(42, 36, 32, 0.88);
            border: 1px solid rgba(112, 66, 20, 0.25);
            border-radius: 3px;
            padding: 5px 10px;
            font-size: 10px;
            color: #8a7060;
            z-index: 40;
            display: flex;
            gap: 10px;
            font-family: 'MedievalSharp', serif;
            box-shadow: inset 0 1px 3px rgba(40, 30, 15, 0.3);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .legend-dot {
            width: 6px;
            height: 6px;
            border-radius: 1px;
            display: inline-block;
        }

        /* ═══ SCALE BAR (turn-based distance) ═══ */
        #scale-container {
            position: absolute;
            bottom: 34px;
            left: 8px;
            background: rgba(42, 36, 32, 0.88);
            border: 1px solid rgba(112, 66, 20, 0.25);
            border-radius: 3px;
            padding: 4px 10px;
            font-size: 10px;
            color: #a08050;
            z-index: 40;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'MedievalSharp', serif;
            box-shadow: inset 0 1px 3px rgba(40, 30, 15, 0.3);
        }
        #scale-level {
            font-size: 9px;
            color: #8a7060;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        #scale-bar-wrap {
            display: flex;
            flex-direction: column;
            align-items: stretch;
        }
        #scale-bar {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #a08050, #8a6a3a);
            border-radius: 1px;
        }
        #scale-ticks {
            display: flex;
            justify-content: space-between;
            width: 60px;
        }
        #scale-ticks span {
            width: 1px;
            height: 4px;
            background: #8a6a3a;
            display: block;
        }
        #scale-turns {
            font-size: 10px;
            color: #c4953a;
            font-weight: 700;
        }

        /* ═══ ERROR TOAST ═══ */
        .v-toast-error {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #7b2020;
            color: #fff;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 13px;
            z-index: 300;
            animation: fadeInUp 0.3s ease;
            font-family: 'MedievalSharp', serif;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translate(-50%, 10px);
            }

            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        /* ═══ FOG PARTICLES ═══ */
        .fog-cloud {
            animation: fogDrift 8s ease-in-out infinite alternate;
        }

        @keyframes fogDrift {
            0% {
                transform: translate(-5px, -2px);
                opacity: 0.05;
            }

            50% {
                opacity: 0.11;
            }

            100% {
                transform: translate(5px, 2px);
                opacity: 0.05;
            }
        }

        /* ═══ DECORATIVE MAP TEXT ═══ */
        .map-deco-text {
            font-family: 'MedievalSharp', serif;
            fill: #704214;
            fill-opacity: 0.12;
            text-anchor: middle;
            pointer-events: none;
            font-style: italic;
        }

        /* ═══ COMPASS ROSE (fixed overlay) ═══ */
        #compass-overlay {
            position: absolute;
            bottom: 36px;
            right: 8px;
            width: 70px;
            height: 70px;
            z-index: 15;
            pointer-events: none;
            filter: drop-shadow(0 1px 3px rgba(0,0,0,0.4));
        }
        #compass-svg {
            width: 100%;
            height: 100%;
        }
        .compass-rose {
            pointer-events: none;
        }

        @keyframes compassSettle {
            0% { transform: rotate(-8deg); }
            15% { transform: rotate(5deg); }
            30% { transform: rotate(-3deg); }
            45% { transform: rotate(2deg); }
            60% { transform: rotate(-1deg); }
            75% { transform: rotate(0.5deg); }
            100% { transform: rotate(0deg); }
        }
        @keyframes compassTremble {
            0%, 100% { transform: rotate(-1deg); }
            50% { transform: rotate(1deg); }
        }

        .compass-needle {
            animation: compassSettle 1.5s ease-out, compassTremble 4s ease-in-out 1.5s infinite;
            transform-origin: center;
            transform-box: fill-box;
        }

        /* ═══ FONT PICKER ═══ */
        #font-picker-btn {
            position: absolute;
            bottom: 8px;
            right: 86px;
            width: 32px;
            height: 24px;
            background: rgba(42, 36, 32, 0.88);
            border: 1px solid rgba(112, 66, 20, 0.25);
            border-radius: 3px;
            color: #a08050;
            font-size: 12px;
            font-weight: 700;
            font-family: 'Cinzel', serif;
            cursor: pointer;
            z-index: 40;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 1px 3px rgba(40, 30, 15, 0.3);
            transition: opacity 0.15s;
        }
        #font-picker-btn:active { opacity: 0.7; }

        #font-picker-dropdown {
            display: none;
            position: absolute;
            bottom: 38px;
            right: 86px;
            width: 210px;
            max-height: 320px;
            overflow-y: auto;
            background: rgba(42, 36, 32, 0.96);
            border: 1px solid rgba(112, 66, 20, 0.4);
            border-radius: 4px;
            z-index: 45;
            box-shadow: 0 -4px 16px rgba(0,0,0,0.4), inset 0 1px 4px rgba(40, 30, 15, 0.3);
            padding: 4px 0;
        }
        #font-picker-dropdown.open { display: block; }

        .font-option {
            display: block;
            width: 100%;
            padding: 8px 12px;
            border: none;
            background: transparent;
            color: #d4c8b0;
            font-size: 14px;
            text-align: left;
            cursor: pointer;
            transition: background 0.1s;
        }
        .font-option:active { background: rgba(112, 66, 20, 0.2); }
        .font-option.selected {
            color: #c4953a;
            background: rgba(112, 66, 20, 0.12);
        }
        .font-picker-title {
            padding: 6px 12px 4px;
            font-size: 10px;
            color: #8a7060;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Cinzel', serif;
            border-bottom: 1px solid rgba(112, 66, 20, 0.15);
            margin-bottom: 2px;
        }

        /* Font override — applied via JS on body[data-font] */
        body[data-font] .loc-label,
        body[data-font] .map-deco-text,
        body[data-font] #map-svg text,
        body[data-font] #compass-svg text {
            font-family: var(--user-font) !important;
        }
        body[data-font] .info-biome,
        body[data-font] .info-desc,
        body[data-font] .info-tag,
        body[data-font] .info-quests,
        body[data-font] .info-dungeons,
        body[data-font] .info-note,
        body[data-font] .info-title,
        body[data-font] .info-btn,
        body[data-font] .v-toast-error,
        body[data-font] #legend,
        body[data-font] #scale-container,
        body[data-font] .bar-btn,
        body[data-font] .hud-name,
        body[data-font] .hud-level,
        body[data-font] .hud-bar-label,
        body[data-font] #current-loc-badge,
        body[data-font] .badge-name,
        body[data-font] .loading-text {
            font-family: var(--user-font) !important;
        }
    </style>
</head>

<body>
    <!-- Loading Screen (walking traveler scene) -->
    <div id="loading">
        <div class="load-scene">
            <!-- Sky -->
            <div class="load-sky"></div>

            <!-- Stars -->
            <div class="load-stars" id="load-stars"></div>

            <!-- Moon -->
            <div class="load-moon"></div>

            <!-- Far mountains (doubled for seamless loop) -->
            <div class="load-mountains-far">
                <svg width="200%" height="100%" viewBox="0 0 800 200" preserveAspectRatio="none">
                    <polygon points="0,200 30,120 70,150 120,80 160,130 200,60 240,110 280,140 320,70 370,130 400,200" fill="#2e2418" opacity="0.7"/>
                    <polygon points="400,200 430,120 470,150 520,80 560,130 600,60 640,110 680,140 720,70 770,130 800,200" fill="#2e2418" opacity="0.7"/>
                    <polygon points="0,200 50,140 100,160 150,100 200,150 250,90 300,130 350,170 400,200" fill="#352a1c" opacity="0.5"/>
                    <polygon points="400,200 450,140 500,160 550,100 600,150 650,90 700,130 750,170 800,200" fill="#352a1c" opacity="0.5"/>
                </svg>
            </div>

            <!-- Near hills (doubled for seamless loop) -->
            <div class="load-hills">
                <svg width="200%" height="100%" viewBox="0 0 800 150" preserveAspectRatio="none">
                    <polygon points="0,150 40,80 90,110 140,50 200,90 260,40 320,80 380,60 400,150" fill="#3a2e1e"/>
                    <polygon points="400,150 440,80 490,110 540,50 600,90 660,40 720,80 780,60 800,150" fill="#3a2e1e"/>
                </svg>
            </div>

            <!-- Ground -->
            <div class="load-ground">
                <div class="load-road"></div>
            </div>

            <!-- Foreground tree silhouettes (doubled for loop) -->
            <div class="load-trees-fg">
                <svg width="200%" height="100%" viewBox="0 0 800 200" preserveAspectRatio="none">
                    <!-- Tree cluster 1 -->
                    <polygon points="50,200 55,100 45,90 60,60 40,50 55,20 50,10 62,30 70,55 58,65 72,95 65,105 70,200" fill="#1a1510" opacity="0.6"/>
                    <!-- Tree cluster 2 -->
                    <polygon points="180,200 185,130 175,120 190,90 172,80 187,55 183,45 195,60 200,85 188,92 202,125 195,135 200,200" fill="#1a1510" opacity="0.4"/>
                    <!-- Tree cluster 3 -->

    <script>
        // ═══ FONT PICKER — Player font preference ═══
        var FONT_OPTIONS = [
            { id: 'medievalsharp', name: 'MedievalSharp', family: "'MedievalSharp', serif", scale: 1.0 },
            { id: 'cinzel',        name: 'Cinzel',        family: "'Cinzel', serif",        scale: 0.92 },
            { id: 'imfell',        name: 'IM Fell English', family: "'IM Fell English', serif", scale: 1.0 },
            { id: 'pirataone',     name: 'Pirata One',    family: "'Pirata One', cursive",  scale: 1.15 },
            { id: 'almendra',      name: 'Almendra',      family: "'Almendra', serif",      scale: 1.05 },
            { id: 'metamorphous',  name: 'Metamorphous',  family: "'Metamorphous', serif",  scale: 1.05 },
        ];
        var _fpOpen = false;

        function initFontPicker() {
            var dd = document.getElementById('font-picker-dropdown');
            var saved = localStorage.getItem('valdoria_font') || 'medievalsharp';
            // Migrate removed fonts
            if (saved === 'uncial') { saved = 'medievalsharp'; localStorage.setItem('valdoria_font', saved); }
            FONT_OPTIONS.forEach(function(f) {
                var btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'font-option' + (f.id === saved ? ' selected' : '');
                btn.style.fontFamily = f.family;
                btn.textContent = f.name;
                btn.dataset.fontId = f.id;
                btn.onclick = function() { selectFont(f.id); };
                dd.appendChild(btn);
            });
            applyFont(saved);
        }

        function toggleFontPicker() {
            _fpOpen = !_fpOpen;
            document.getElementById('font-picker-dropdown').classList.toggle('open', _fpOpen);
        }

        function selectFont(fontId) {
            var opt = FONT_OPTIONS.find(function(f) { return f.id === fontId; });
            if (!opt) return;
            localStorage.setItem('valdoria_font', fontId);
            applyFont(fontId);
            // Update selected state
            document.querySelectorAll('.font-option').forEach(function(btn) {
                btn.classList.toggle('selected', btn.dataset.fontId === fontId);
            });
            _fpOpen = false;
            document.getElementById('font-picker-dropdown').classList.remove('open');
        }

        function applyFont(fontId) {
            var opt = FONT_OPTIONS.find(function(f) { return f.id === fontId; });
            if (!opt) return;
            // Set CSS variable for overrides + data attribute to activate selectors
            document.body.style.setProperty('--user-font', opt.family);
            document.body.dataset.font = fontId;
            // Also set body font-family directly for non-overridden elements
            document.body.style.fontFamily = opt.family;
            // Scale SVG text for fonts that render smaller/larger
            var s = opt.scale || 1;
            document.querySelectorAll('#map-svg text, #compass-svg text').forEach(function(t) {
                var base = parseFloat(t.getAttribute('data-base-size') || t.getAttribute('font-size') || '9.5');
                if (!t.getAttribute('data-base-size')) t.setAttribute('data-base-size', base);
                t.setAttribute('font-size', (base * s).toFixed(1) + 'px');
            });
        }

        // Close dropdown when tapping outside
        document.addEventListener('click', function(e) {
            if (_fpOpen && !e.target.closest('#font-picker-dropdown') && !e.target.closest('#font-picker-btn')) {
                _fpOpen = false;
                document.getElementById('font-picker-dropdown').classList.remove('open');
            }
        });

        // Init on load
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initFontPicker);
        } else {
            initFontPicker();
        }
    </script>
    <script>
    // Generate stars and dust for loading scene
    (function() {
        const starsEl = document.getElementById('load-stars');
        if (!starsEl) return;
        for (let i = 0; i < 25; i++) {
            const s = document.createElement('div');
            s.className = 'load-star';
            s.style.left = (Math.random() * 100) + '%';
            s.style.top = (Math.random() * 100) + '%';
            s.style.animationDelay = (Math.random() * 3) + 's';
            s.style.width = s.style.height = (1 + Math.random() * 2) + 'px';
            starsEl.appendChild(s);
        }
        const dustEl = document.getElementById('load-dust');
        if (!dustEl) return;
        for (let i = 0; i < 8; i++) {
            const d = document.createElement('div');
            d.className = 'dust-p';
            d.style.left = (40 + Math.random() * 30) + '%';
            d.style.bottom = (Math.random() * 60) + '%';
            d.style.animationDelay = (Math.random() * 6) + 's';
            d.style.animationDuration = (4 + Math.random() * 4) + 's';
            dustEl.appendChild(d);
        }
    })();
    </script>
