<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lendas de Valdoria</title>
    <link rel="icon" href="../favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../shared/fonts.css">
    <script>
        var v = Date.now();
        document.write('<link rel="stylesheet" href="../valdoria-design.css?v=' + v + '">');
        document.write('<link rel="stylesheet" href="game.css?v=' + v + '">');
    </script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="../shared/font-apply.js"></script>
</head>

<body>
    <!-- Loading overlay -->
    <div id="loading" class="loading-overlay">
        <!-- Floating particles (embers + sparks + elemental) -->
        <div class="loading-particles">
            <div class="particle ember p1"></div>
            <div class="particle ember p2"></div>
            <div class="particle ember p3"></div>
            <div class="particle ember p4"></div>
            <div class="particle ember p5"></div>
            <div class="particle ember p6"></div>
            <div class="particle spark s1"></div>
            <div class="particle spark s2"></div>
            <div class="particle spark s3"></div>
            <div class="particle spark s4"></div>
            <div class="particle mote m1"></div>
            <div class="particle mote m2"></div>
            <!-- Elemental particles -->
            <div class="particle flame fl1"></div>
            <div class="particle flame fl2"></div>
            <div class="particle flame fl3"></div>
            <div class="particle frost fr1"></div>
            <div class="particle frost fr2"></div>
            <div class="particle frost fr3"></div>
            <div class="particle lightning lt1"></div>
            <div class="particle lightning lt2"></div>
            <div class="particle arcane ar1"></div>
            <div class="particle arcane ar2"></div>
            <div class="particle arcane ar3"></div>
        </div>

        <!-- Magic summoning circle -->
        <div class="magic-circle">
            <!-- Aura glow layers -->
            <div class="mc-aura"></div>
            <div class="mc-aura mc-aura-2"></div>

            <!-- Outer rune ring (Elder Futhark runes rotating CW) -->
            <svg class="mc-ring mc-outer" viewBox="0 0 300 300">
                <defs>
                    <path id="runeOuter" d="M150,150 m-125,0 a125,125 0 1,1 250,0 a125,125 0 1,1 -250,0"/>
                </defs>
                <circle cx="150" cy="150" r="125" fill="none" stroke="rgba(196,149,58,0.06)" stroke-width="1"/>
                <circle cx="150" cy="150" r="127" fill="none" stroke="rgba(196,149,58,0.04)" stroke-width="0.5" stroke-dasharray="4 8"/>
                <text class="mc-rune-text" fill="rgba(196,149,58,0.5)">
                    <textPath href="#runeOuter" startOffset="0%">&#5792; &#5794; &#5798; &#5800; &#5809; &#5810; &#5815; &#5817; &#5818; &#5822; &#5825; &#5827; &#5831; &#5832; &#5833; &#5834; &#5839; &#5842; &#5846; &#5848; &#5850; &#5852; &#5853; &#5855;</textPath>
                </text>
            </svg>

            <!-- Mid energy ring (arcs rotating CCW) -->
            <svg class="mc-ring mc-mid" viewBox="0 0 300 300">
                <circle cx="150" cy="150" r="102" fill="none" stroke="rgba(196,149,58,0.05)" stroke-width="0.5"/>
                <circle class="mc-energy-arc mc-arc-1" cx="150" cy="150" r="102" fill="none" stroke="rgba(196,149,58,0.6)" stroke-width="1.5" stroke-linecap="round"/>
                <circle class="mc-energy-arc mc-arc-2" cx="150" cy="150" r="96" fill="none" stroke="rgba(123,32,32,0.5)" stroke-width="1.5" stroke-linecap="round"/>
                <!-- Geometric marks at cardinal points -->
                <g opacity="0.3" fill="none" stroke="rgba(196,149,58,0.6)" stroke-width="1">
                    <line x1="150" y1="44" x2="150" y2="54"/>
                    <line x1="150" y1="246" x2="150" y2="256"/>
                    <line x1="44" y1="150" x2="54" y2="150"/>
                    <line x1="246" y1="150" x2="256" y2="150"/>
                    <!-- Diagonal marks -->
                    <line x1="78" y1="78" x2="85" y2="85" opacity="0.5"/>
                    <line x1="222" y1="78" x2="215" y2="85" opacity="0.5"/>
                    <line x1="78" y1="222" x2="85" y2="215" opacity="0.5"/>
                    <line x1="222" y1="222" x2="215" y2="215" opacity="0.5"/>
                </g>
            </svg>

            <!-- Inner text ring (VALDORIA rotating CW faster) -->
            <svg class="mc-ring mc-inner" viewBox="0 0 300 300">
                <defs>
                    <path id="runeInner" d="M150,150 m-75,0 a75,75 0 1,1 150,0 a75,75 0 1,1 -150,0"/>
                </defs>
                <circle cx="150" cy="150" r="75" fill="none" stroke="rgba(196,149,58,0.06)" stroke-width="0.5"/>
                <text class="mc-inner-text" fill="rgba(196,149,58,0.35)">
                    <textPath href="#runeInner" startOffset="0%">&#9670; VALDORIA &#9670; LENDAS &#9670; VALDORIA &#9670; LENDAS </textPath>
                </text>
            </svg>

            <!-- Magic pulse (periodic radial flash) -->
            <div class="mc-pulse"></div>
            <div class="mc-pulse mc-pulse-2"></div>

        </div>

        <!-- Title -->
        <div class="loading-brand">
            <div class="loading-title">LENDAS DE VALDORIA</div>
            <div class="loading-divider">
                <span class="divider-rune">&#9670;</span>
            </div>
        </div>

        <!-- Progress bar -->
        <div class="loading-progress-wrap">
            <div class="loading-progress-track">
                <div id="loading-progress" class="loading-progress-fill"></div>
            </div>
        </div>

        <!-- Tip -->
        <div class="loading-tip-area">
            <div id="loading-tip" class="loading-tip">Preparando sua aventura...</div>
        </div>
    </div>

    <!-- Main screen container (scrollable content only) -->
    <div id="screen" class="screen" style="display:none">
        <!-- Banner image (optional) -->
        <div id="banner" class="screen-banner" style="display:none">
            <img id="banner-img" src="" alt="">
        </div>

        <!-- Screen text content -->
        <div id="content" class="screen-content"></div>
    </div>

    <!-- Immersive mode: collapse toggle (above bottom panel) -->
    <button id="immersive-toggle" class="immersive-toggle" style="display:none"
        aria-label="Recolher menu">&middot;</button>

    <!-- Fixed bottom panel (action buttons + text input + footer) -->
    <div id="bottom-panel" class="bottom-panel" style="display:none">
        <div id="buttons" class="screen-buttons"></div>
        <div id="text-input-wrap" class="text-input-wrap" style="display:none">
            <input id="text-input" type="text" class="text-input" placeholder="Digite aqui..." autocomplete="off">
            <button id="text-send" class="text-send-btn">➤</button>
            <span id="text-input-max" class="text-input-max"></span>
        </div>
        <div id="footer-quick" class="footer-row footer-quick"></div>
        <div id="footer-nav" class="footer-row footer-nav"></div>
    </div>

    <!-- Immersive mode: restore pill (when panel is collapsed) -->
    <button id="immersive-restore" class="immersive-restore" style="display:none">&middot; Menu</button>

    <!-- Dice roll overlay (3D animation for skill checks) -->
    <div id="dice-overlay" class="dice-overlay" style="display:none">
        <div class="dice-overlay-content">
            <div class="dice-skill-label" id="dice-skill-label"></div>
            <div class="dice3d-canvas" id="dice3d-canvas"></div>
            <div class="dice-formula" id="dice-formula"></div>
            <div class="dice-result" id="dice-result"></div>
            <button class="v-skip-btn" id="dice-skip-btn" style="display:none">Continuar &raquo;</button>
        </div>
    </div>

    <!-- Inn sleep animation overlay -->
    <div id="inn-overlay" class="inn-overlay" style="display:none">
        <div class="inn-vignette"></div>
        <div class="inn-frame" id="inn-frame">
            <div class="inn-night-bar" id="inn-night-bar"></div>
            <div class="inn-title" id="inn-title"></div>
            <div class="inn-icons" id="inn-icons"></div>
            <div class="inn-text" id="inn-text"></div>
            <div class="inn-recovery" id="inn-recovery"></div>
        </div>
        <button class="v-skip-btn" id="inn-skip-btn" style="display:none">Acordar »</button>
    </div>

    <!-- Toast notification -->
    <div id="toast" class="toast" style="display:none"></div>

    <!-- Timer overlay -->
    <div id="timer-overlay" class="timer-overlay" style="display:none">
        <div class="timer-ring">
            <svg viewBox="0 0 80 80">
                <circle class="timer-bg" cx="40" cy="40" r="36" />
                <circle id="timer-arc" class="timer-arc" cx="40" cy="40" r="36" />
            </svg>
            <div id="timer-seconds" class="timer-seconds">30</div>
        </div>
        <div id="timer-label" class="timer-label">Sua vez!</div>
        <button id="timer-skip" class="v-skip-btn" style="display:none">Pular ▸</button>
    </div>

    <!-- Error overlay injected dynamically by shared/error-reporter.js -->

    <!-- Ambient particles canvas -->
    <canvas id="ambient-particles"></canvas>

    <!-- Location transition overlay (immersive 2s travel screen) -->
    <div id="loc-transition" class="loc-transition" style="display:none">
        <div class="loc-transition-vignette"></div>
        <div class="loc-transition-icon" id="loc-icon"></div>
        <div class="loc-transition-text" id="loc-text">Viajando...</div>
        <div class="loc-transition-dots"><span>.</span><span>.</span><span>.</span></div>
    </div>

    <!-- Transition animation overlay -->
    <div id="transition-overlay" class="transition-overlay" style="display:none"></div>

    <script>
        var v = Date.now();
        var scripts = ['game-enhancer.js', 'game-particles.js', 'game-core.js', 'game-renderer.js', 'game-dialogue.js', 'game-ui.js', 'game-transitions.js', 'inn-animation.js'];
        document.write('<script src="../shared/error-reporter.js?v=' + v + '"><\/script>');
        document.write('<script src="../shared/dice-3d.js?v=' + v + '"><\/script>');
        scripts.forEach(function (s) {
            document.write('<script src="' + s + '?v=' + v + '"><\/script>');
        });
    </script>
</body>

</html>
