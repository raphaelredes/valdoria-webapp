<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lendas de Valdoria</title>
    <link rel="icon" href="../favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../valdoria-design.css?v=4">
    <link rel="stylesheet" href="game.css?v=5">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <!-- Loading overlay -->
    <div id="loading" class="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Entrando em Valdoria...</div>
    </div>

    <!-- Main screen container (scrollable content only) -->
    <div id="screen" class="screen" style="display:none">
        <!-- Banner image (optional) -->
        <div id="banner" class="screen-banner" style="display:none">
            <img id="banner-img" src="" alt="">
        </div>

        <!-- Screen text content -->
        <div id="content" class="screen-content"></div>
    </div>

    <!-- Fixed bottom panel (action buttons + text input + footer) -->
    <div id="bottom-panel" class="bottom-panel" style="display:none">
        <div id="buttons" class="screen-buttons"></div>
        <div id="text-input-wrap" class="text-input-wrap" style="display:none">
            <input id="text-input" type="text" class="text-input" placeholder="Digite aqui..." autocomplete="off">
            <button id="text-send" class="text-send-btn">➤</button>
            <span id="text-input-max" class="text-input-max"></span>
        </div>
        <div id="footer-quick" class="footer-row footer-quick"></div>
        <div id="footer-nav" class="footer-row footer-nav"></div>
    </div>

    <!-- Toast notification -->
    <div id="toast" class="toast" style="display:none"></div>

    <!-- Timer overlay -->
    <div id="timer-overlay" class="timer-overlay" style="display:none">
        <div class="timer-ring">
            <svg viewBox="0 0 80 80"><circle class="timer-bg" cx="40" cy="40" r="36"/><circle id="timer-arc" class="timer-arc" cx="40" cy="40" r="36"/></svg>
            <div id="timer-seconds" class="timer-seconds">30</div>
        </div>
        <div id="timer-label" class="timer-label">Sua vez!</div>
        <button id="timer-skip" class="v-skip-btn" style="display:none">Pular ▸</button>
    </div>

    <!-- Error overlay -->
    <div id="error-overlay" class="error-overlay" style="display:none">
        <div class="error-content">
            <div class="error-icon">⚠️</div>
            <div id="error-msg" class="error-msg"></div>
            <button id="error-retry" class="btn-action">Tentar Novamente</button>
        </div>
    </div>

    <!-- Transition animation overlay -->
    <div id="transition-overlay" class="transition-overlay" style="display:none"></div>

    <script src="game-enhancer.js?v=3"></script>
    <script src="game-core.js?v=3"></script>
    <script src="game-renderer.js?v=4"></script>
    <script src="game-ui.js?v=4"></script>
    <script src="game-transitions.js?v=3"></script>
</body>
</html>
