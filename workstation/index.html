<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2b2830">
    <meta name="description" content="Oficina de Artesanato - Lendas de Valdoria">
    <meta property="og:title" content="Oficina de Artesanato - Lendas de Valdoria">
    <meta property="og:description" content="Fabrique itens e equipamentos no RPG medieval">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <link rel="manifest" href="../manifest.json">
    <title>Oficina de Artesanato - Lendas de Valdoria</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="../valdoria-design.css?v=4">
    <style>
        body { padding-bottom: 80px; }
        .header {
            background: linear-gradient(135deg, var(--v-bg-raised), var(--v-bg-accent));
            padding: 16px;
            text-align: center;
            border-bottom: 2px solid var(--v-gold-dim);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--v-crimson), var(--v-gold), var(--v-crimson), transparent);
        }
        .header h1 {
            font-size: 18px;
            color: var(--v-gold);
            margin-bottom: 4px;
            text-shadow: 0 0 15px rgba(196, 149, 58, 0.4), 0 2px 4px rgba(0, 0, 0, 0.5);
        }
        .header .stats {
            font-size: 12px;
            color: var(--v-text-dim);
        }
        .tabs {
            display: flex;
            overflow-x: auto;
            gap: 4px;
            padding: 10px 12px;
            background: var(--v-bg-raised);
            border-bottom: 1px solid var(--v-border);
            -webkit-overflow-scrolling: touch;
        }
        .tabs::-webkit-scrollbar { display: none; }
        .tab {
            flex-shrink: 0;
            padding: 8px 14px;
            border-radius: var(--v-radius-pill);
            font-size: 13px;
            border: 1px solid var(--v-border);
            background: var(--v-bg-card);
            color: var(--v-text-dim);
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .tab.active {
            background: var(--v-gold-dim);
            color: #fff;
            border-color: var(--v-gold);
        }
        .content { padding: 12px; }

        /* Recipe cards */
        .recipe-card {
            background: var(--v-bg-card);
            border: 1px solid var(--v-border);
            border-radius: var(--v-radius);
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .recipe-card:active { transform: scale(0.98); }
        .recipe-card.selected {
            border-color: var(--v-gold);
            box-shadow: var(--v-shadow-gold);
        }
        .recipe-card.craftable { border-left: 3px solid var(--v-success); }
        .recipe-card.missing { border-left: 3px solid var(--v-danger); }
        .recipe-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .recipe-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--v-text);
        }
        .recipe-badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 600;
        }
        .badge-ready { background: var(--v-success); color: #fff; }
        .badge-missing { background: var(--v-danger); color: #fff; }
        .recipe-meta {
            font-size: 12px;
            color: var(--v-text-dim);
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        /* Recipe detail panel */
        .detail-panel {
            background: var(--v-bg-raised);
            border: 1px solid var(--v-gold-dim);
            border-radius: var(--v-radius);
            padding: 14px;
            margin-top: 12px;
            display: none;
        }
        .detail-panel.visible { display: block; }
        .detail-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--v-gold);
            margin-bottom: 10px;
        }
        .ingredient-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid var(--v-border);
            font-size: 13px;
        }
        .ingredient-row:last-child { border-bottom: none; }
        .ing-status { font-size: 14px; margin-right: 6px; }
        .gold-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 14px;
            font-weight: 600;
            color: var(--v-gold);
        }
        .output-row {
            padding: 10px 0;
            font-size: 14px;
            color: var(--v-success);
            font-weight: 600;
        }

        /* Craft button */
        .craft-btn-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px 16px;
            background: linear-gradient(transparent, var(--v-bg) 30%);
            z-index: 100;
        }
        .craft-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--v-radius);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .craft-btn.enabled {
            background: linear-gradient(135deg, var(--v-gold), var(--v-gold-dim));
            color: var(--v-bg);
        }
        .craft-btn.enabled:active { transform: scale(0.98); }
        .craft-btn.disabled {
            background: var(--v-border);
            color: var(--v-text-dim);
            cursor: not-allowed;
        }

        /* Materials tab */
        .material-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            background: var(--v-bg-card);
            border-radius: 8px;
            margin-bottom: 6px;
            font-size: 14px;
        }
        .material-qty {
            color: var(--v-gold);
            font-weight: 600;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--v-text-dim);
        }
        .empty-state .icon { font-size: 40px; margin-bottom: 12px; }

        /* Rarity colors: use .v-rarity-* from valdoria-design.css */

        /* Animations */
        .fade-in { animation: v-fadeIn 0.3s ease; }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚒️ OFICINA DE ARTESANATO</h1>
        <div class="stats" id="headerStats">Carregando...</div>
    </div>
    <div class="tabs" id="tabsContainer"></div>
    <div class="content" id="mainContent"></div>
    <div class="craft-btn-container" id="craftBtnContainer" style="display:none;">
        <button class="craft-btn disabled" id="craftBtn" disabled>🔨 Selecione uma receita</button>
    </div>

    <script>
    const tg = window.Telegram?.WebApp;
    const _vBg = getComputedStyle(document.documentElement).getPropertyValue('--v-bg').trim() || '#2b2830';
    if (tg) {
        tg.ready();
        tg.expand();
        tg.setHeaderColor(_vBg);
        tg.setBackgroundColor(_vBg);
    }

    let PAYLOAD = null;
    let selectedRecipe = null;
    let activeTab = null;

    const RARITY_LABELS = {
        common: 'Comum', uncommon: 'Incomum', rare: 'Raro',
        very_rare: 'Muito Raro', legendary: 'Lendário',
    };

    // ── Parse URL params ──
    function decodeBase64Utf8(b64) {
        const raw = b64.replace(/-/g, '+').replace(/_/g, '/');
        const binary = atob(raw);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        return new TextDecoder().decode(bytes);
    }

    function init() {
        const params = new URLSearchParams(window.location.search);
        const dataB64 = params.get('data');

        if (!dataB64) {
            showError('Dados não encontrados.');
            return;
        }

        try {
            const json = decodeBase64Utf8(dataB64);
            PAYLOAD = JSON.parse(json);
        } catch (e) {
            console.error('[WORKSTATION] Erro ao decodificar dados', e);
            showError('Erro ao decodificar dados.');
            return;
        }

        updateHeader();
        buildTabs();
    }

    function showError(msg) {
        console.error('[WORKSTATION]', msg);
        document.getElementById('mainContent').innerHTML =
            `<div class="empty-state"><div class="icon">⚠️</div><p>${msg}</p></div>`;
    }

    function updateHeader() {
        const stats = document.getElementById('headerStats');
        const matCount = Object.values(PAYLOAD.materials).reduce((a, b) => a + b, 0);
        stats.textContent = `💰 ${PAYLOAD.gold} GP · 📦 ${matCount} materiais · Lv.${PAYLOAD.level}`;
    }

    // ── Tabs ──
    function buildTabs() {
        const container = document.getElementById('tabsContainer');
        container.innerHTML = '';
        const toolKeys = Object.keys(PAYLOAD.tools);

        toolKeys.forEach((tk, i) => {
            const t = PAYLOAD.tools[tk];
            const tab = document.createElement('div');
            tab.className = 'tab' + (i === 0 ? ' active' : '');
            tab.textContent = `${t.emoji} ${t.name}`;
            tab.onclick = () => selectTab(tk, tab);
            container.appendChild(tab);
        });

        const matTab = document.createElement('div');
        matTab.className = 'tab';
        matTab.textContent = '📦 Materiais';
        matTab.onclick = () => selectTab('_materials', matTab);
        container.appendChild(matTab);

        if (toolKeys.length > 0) {
            selectTab(toolKeys[0], container.children[0]);
        } else {
            selectTab('_materials', matTab);
        }
    }

    function selectTab(key, tabEl) {
        activeTab = key;
        selectedRecipe = null;
        updateCraftButton();

        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tabEl.classList.add('active');

        if (key === '_materials') {
            renderMaterials();
        } else {
            renderRecipes(key);
        }
    }

    // ── Recipes ──
    function renderRecipes(toolKey) {
        const content = document.getElementById('mainContent');
        const recipes = PAYLOAD.recipes.filter(r => r.tool === toolKey);

        if (!recipes.length) {
            content.innerHTML = '<div class="empty-state"><div class="icon">📜</div>' +
                '<p>Nenhuma receita disponível para esta ferramenta no seu nível.</p></div>';
            document.getElementById('craftBtnContainer').style.display = 'none';
            return;
        }

        document.getElementById('craftBtnContainer').style.display = 'block';

        let html = '';
        recipes.forEach(r => {
            const ready = r.has_materials && r.can_afford;
            const cls = ready ? 'craftable' : 'missing';
            const badge = ready
                ? '<span class="recipe-badge badge-ready">✅ Pronto</span>'
                : '<span class="recipe-badge badge-missing">❌ Falta</span>';

            html += `
            <div class="recipe-card ${cls} fade-in" data-id="${r.id}" onclick="selectRecipeCard('${r.id}')">
                <div class="recipe-header">
                    <span class="recipe-name">${r.name}</span>
                    ${badge}
                </div>
                <div class="recipe-meta">
                    <span>Lv.${r.min_level}</span>
                    <span>DC ${r.dc}</span>
                    <span>💰 ${r.cost_gp} GP</span>
                    <span class="v-rarity-${r.rarity}">${RARITY_LABELS[r.rarity] || r.rarity}</span>
                </div>
            </div>
            <div class="detail-panel" id="detail-${r.id}">
                ${buildDetailHTML(r)}
            </div>`;
        });

        content.innerHTML = html;
    }

    function buildDetailHTML(recipe) {
        let ingHTML = '';
        recipe.ingredients.forEach(ing => {
            const have = PAYLOAD.materials[ing.item] || 0;
            const ok = have >= ing.qty;
            const icon = ok ? '✅' : '❌';
            ingHTML += `<div class="ingredient-row">
                <span><span class="ing-status">${icon}</span> ${ing.item}</span>
                <span>${have}/${ing.qty}</span>
            </div>`;
        });

        const goldOk = PAYLOAD.gold >= recipe.cost_gp;
        const goldIcon = goldOk ? '✅' : '❌';

        return `
            <div class="detail-title">📋 ${recipe.name}</div>
            <div style="font-size:13px;color:var(--v-text-dim);margin-bottom:8px;">
                Resultado: <b>${recipe.output_qty}× ${recipe.output}</b>
            </div>
            <div style="font-size:12px;color:var(--v-text-dim);margin-bottom:10px;">
                <b>Ingredientes:</b>
            </div>
            ${ingHTML}
            <div class="gold-row">
                <span>${goldIcon} Custo</span>
                <span>${recipe.cost_gp} GP (você: ${PAYLOAD.gold} GP)</span>
            </div>
        `;
    }

    function selectRecipeCard(recipeId) {
        if (selectedRecipe === recipeId) {
            selectedRecipe = null;
        } else {
            selectedRecipe = recipeId;
        }

        document.querySelectorAll('.recipe-card').forEach(c => {
            c.classList.toggle('selected', c.dataset.id === selectedRecipe);
        });

        document.querySelectorAll('.detail-panel').forEach(p => {
            p.classList.toggle('visible', p.id === `detail-${selectedRecipe}`);
        });

        updateCraftButton();

        if (selectedRecipe) {
            const detail = document.getElementById(`detail-${selectedRecipe}`);
            if (detail) {
                setTimeout(() => detail.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
            }
        }
    }

    function updateCraftButton() {
        const btn = document.getElementById('craftBtn');
        const container = document.getElementById('craftBtnContainer');

        if (!selectedRecipe) {
            btn.className = 'craft-btn disabled';
            btn.disabled = true;
            btn.textContent = '🔨 Selecione uma receita';
            return;
        }

        const recipe = PAYLOAD.recipes.find(r => r.id === selectedRecipe);
        if (!recipe) return;

        const ready = recipe.has_materials && recipe.can_afford;
        if (ready) {
            btn.className = 'craft-btn enabled';
            btn.disabled = false;
            btn.textContent = `🔨 Fabricar ${recipe.name}`;
            btn.onclick = () => executeCraft(recipe.id);
        } else {
            btn.className = 'craft-btn disabled';
            btn.disabled = true;
            const missing = recipe.missing.length > 0
                ? `Falta: ${recipe.missing.join(', ')}`
                : `Ouro insuficiente`;
            btn.textContent = `❌ ${missing}`;
        }
    }

    function executeCraft(recipeId) {
        const btn = document.getElementById('craftBtn');
        btn.disabled = true;
        btn.textContent = '⏳ Fabricando...';
        btn.className = 'craft-btn disabled';

        const params = new URLSearchParams(window.location.search);
        const token = params.get('token') || '';

        if (tg) {
            tg.sendData(JSON.stringify({
                action: 'craft_complete',
                recipe_id: recipeId,
                token: token,
            }));
            // Safety: close webapp if sendData didn't auto-close
            setTimeout(() => { try { tg.close(); } catch(_) {} }, 300);
        }
    }

    // ── Materials ──
    function renderMaterials() {
        const content = document.getElementById('mainContent');
        document.getElementById('craftBtnContainer').style.display = 'none';

        const mats = PAYLOAD.materials;
        const entries = Object.entries(mats).sort((a, b) => a[0].localeCompare(b[0]));

        if (!entries.length) {
            content.innerHTML = '<div class="empty-state"><div class="icon">📦</div>' +
                '<p>Nenhum material no inventário.</p>' +
                '<p style="font-size:12px;margin-top:8px;">Colete materiais na Oficina ou durante explorações.</p></div>';
            return;
        }

        let html = '';
        entries.forEach(([name, qty]) => {
            html += `<div class="material-row fade-in">
                <span>${name}</span>
                <span class="material-qty">×${qty}</span>
            </div>`;
        });

        content.innerHTML = html;
    }

    // ── Boot ──
    init();
    </script>
    <script>if('serviceWorker' in navigator){navigator.serviceWorker.register('../sw.js').catch(()=>{})}</script>
</body>
</html>
