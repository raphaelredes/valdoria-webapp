<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2b2830">
    <title>Explorar - Lendas de Valdoria</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="../valdoria-design.css?v=4">
    <style>
        /* ═══════════════════════════════════════════
           LAYOUT
           ═══════════════════════════════════════════ */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ═══════════════════════════════════════════
           HUD (top bar)
           ═══════════════════════════════════════════ */
        #hud {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: linear-gradient(180deg, #352f38 0%, var(--v-bg, #2b2830) 100%);
            border-bottom: 1px solid var(--v-border, #3e3845);
            z-index: 50;
            flex-shrink: 0;
        }
        .hud-name {
            font-size: 13px;
            font-weight: 700;
            color: var(--v-gold, #c4953a);
            flex-shrink: 0;
            max-width: 90px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .hud-stat {
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 3px;
            white-space: nowrap;
        }
        .hp-bar {
            width: 60px;
            height: 8px;
            background: #1a1a1a;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #333;
        }
        .hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #7b2020, #a03030);
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        .hud-rewards {
            margin-left: auto;
            display: flex;
            gap: 8px;
        }
        .reward-badge {
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 8px;
            background: rgba(196, 149, 58, 0.15);
            border: 1px solid rgba(196, 149, 58, 0.3);
            transition: transform 0.3s ease;
        }
        .reward-badge.pop {
            transform: scale(1.2);
        }

        /* ═══════════════════════════════════════════
           MAP VIEWPORT
           ═══════════════════════════════════════════ */
        #map-viewport {
            flex: 1;
            overflow: auto;
            position: relative;
            -webkit-overflow-scrolling: touch;
        }
        #map-container {
            position: relative;
            padding: 20px 10px;
            min-height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ═══════════════════════════════════════════
           HEX GRID
           ═══════════════════════════════════════════ */
        .hex-row {
            display: flex;
            gap: 2px;
            margin-top: -6px;
        }
        .hex-row:first-child { margin-top: 0; }
        .hex-row.odd { margin-left: 17px; }

        .hex {
            width: 30px;
            height: 34px;
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
            position: relative;
            transition: opacity 0.4s ease, transform 0.2s ease;
            flex-shrink: 0;
        }
        .hex:active { transform: scale(0.9); }

        /* Fog states */
        .hex.fog-hidden {
            opacity: 0;
            pointer-events: none;
        }
        .hex.fog-dim {
            opacity: 0.25;
            filter: brightness(0.4) saturate(0.2);
            pointer-events: none;
        }
        .hex.fog-visible {
            opacity: 1;
        }

        /* Player token */
        .hex.player {
            z-index: 10;
        }
        .hex.player::after {
            content: '';
            position: absolute;
            inset: 1px;
            border: 2px solid var(--v-gold, #c4953a);
            border-radius: 50%;
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            box-shadow: 0 0 8px rgba(196, 149, 58, 0.6);
            animation: playerPulse 2s infinite;
        }

        /* POI marker */
        .hex.poi::before {
            content: '!';
            position: absolute;
            top: -2px;
            right: 0;
            font-size: 9px;
            font-weight: 900;
            color: var(--v-gold, #c4953a);
            text-shadow: 0 0 6px rgba(196, 149, 58, 0.8);
            animation: poiBounce 1.5s infinite;
            z-index: 5;
        }
        .hex.poi-resolved::before { display: none; }

        /* Exit tile */
        .hex.exit-tile {
            box-shadow: inset 0 0 8px rgba(58, 196, 100, 0.4);
        }
        .hex.exit-tile::before {
            content: '▲';
            position: absolute;
            top: -3px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 8px;
            color: #4a8;
        }

        /* Impassable */
        .hex.blocked { cursor: not-allowed; }

        /* Adjacent highlight */
        .hex.adjacent {
            outline: 1px solid rgba(196, 149, 58, 0.3);
            outline-offset: -2px;
        }

        @keyframes playerPulse {
            0%, 100% { box-shadow: 0 0 6px rgba(196, 149, 58, 0.4); }
            50% { box-shadow: 0 0 14px rgba(196, 149, 58, 0.8); }
        }
        @keyframes poiBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        /* Floating player token (animates between hexes) */
        #player-token {
            position: absolute;
            width: 36px;
            height: 36px;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            z-index: 15;
            pointer-events: none;
            transition: left 0.25s ease-out, top 0.25s ease-out;
            background: radial-gradient(circle, rgba(196,149,58,0.3) 0%, transparent 70%);
            border: 2px solid var(--v-gold, #c4953a);
            border-radius: 50%;
            filter: drop-shadow(0 0 8px rgba(196, 149, 58, 0.8));
            animation: tokenPulse 2s infinite;
        }
        @keyframes tokenPulse {
            0%, 100% { filter: drop-shadow(0 0 6px rgba(196, 149, 58, 0.6)); transform: scale(1); }
            50% { filter: drop-shadow(0 0 14px rgba(196, 149, 58, 1.0)); transform: scale(1.08); }
        }

        /* Dust particles on movement */
        .dust-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(196, 149, 58, 0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 14;
            animation: dustFade 0.5s ease-out forwards;
        }
        @keyframes dustFade {
            0% { opacity: 1; transform: scale(1) translateY(0); }
            100% { opacity: 0; transform: scale(0.3) translateY(-10px); }
        }

        /* Portal overlay */
        .portal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(20, 40, 30, 0.96);
            z-index: 300;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        .portal-overlay.active { opacity: 1; pointer-events: all; }
        .portal-icon { font-size: 64px; animation: portalGlow 1.5s ease infinite; }
        .portal-title { font-size: 18px; font-weight: 700; color: #4ad680; letter-spacing: 1px; }
        .portal-summary { text-align: center; color: var(--v-text, #e0d6c8); font-size: 13px; line-height: 1.8; }
        .portal-summary .reward-line { color: var(--v-gold, #c4953a); font-weight: 600; }
        @keyframes portalGlow {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(74, 214, 128, 0.4)); transform: scale(1); }
            50% { filter: drop-shadow(0 0 24px rgba(74, 214, 128, 0.8)); transform: scale(1.05); }
        }

        /* Random encounter overlay (alarm theme) */
        .encounter-overlay {
            position: fixed;
            inset: 0;
            z-index: 250;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .encounter-overlay.active { opacity: 1; pointer-events: all; }
        .encounter-overlay .dm-card {
            border-color: rgba(180, 50, 50, 0.5);
            box-shadow: 0 0 30px rgba(180, 50, 50, 0.15), 0 8px 32px rgba(0,0,0,0.5);
        }
        .encounter-flash {
            position: fixed; inset: 0;
            background: rgba(200, 60, 60, 0.3);
            z-index: 249;
            animation: encounterFlash 0.4s ease-out forwards;
            pointer-events: none;
        }
        @keyframes encounterFlash {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* ═══════════════════════════════════════════
           BOTTOM BAR
           ═══════════════════════════════════════════ */
        #bottom-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: linear-gradient(0deg, #352f38 0%, var(--v-bg, #2b2830) 100%);
            border-top: 1px solid var(--v-border, #3e3845);
            z-index: 50;
            flex-shrink: 0;
        }
        .btn-return {
            padding: 8px 16px;
            border: 1px solid var(--v-gold-dim, #9a7530);
            background: linear-gradient(180deg, rgba(196,149,58,0.15) 0%, rgba(196,149,58,0.05) 100%);
            color: var(--v-gold, #c4953a);
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-return:active { transform: scale(0.95); }
        .location-info {
            font-size: 11px;
            color: var(--v-text-dim, #8a8090);
            text-align: right;
        }

        /* ═══════════════════════════════════════════
           DM OVERLAY (narration)
           ═══════════════════════════════════════════ */
        .dm-overlay {
            position: fixed;
            inset: 0;
            background: rgba(43, 40, 48, 0.95);
            z-index: 200;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .dm-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .dm-card {
            background: linear-gradient(165deg, #342e3a 0%, #282430 100%);
            border: 1px solid rgba(196, 149, 58, 0.3);
            border-radius: 10px;
            padding: 20px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 0 30px rgba(196, 149, 58, 0.1), 0 8px 32px rgba(0,0,0,0.5);
        }
        .dm-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        .dm-icon {
            font-size: 28px;
        }
        .dm-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--v-gold, #c4953a);
            letter-spacing: 0.5px;
        }
        .dm-type-badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            background: rgba(196, 149, 58, 0.15);
            color: var(--v-gold-dim, #9a7530);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .dm-narration {
            font-style: italic;
            line-height: 1.6;
            color: var(--v-text, #e0d6c8);
            margin-bottom: 16px;
            min-height: 40px;
        }
        .dm-narration .cursor {
            display: inline-block;
            width: 2px;
            height: 14px;
            background: var(--v-gold, #c4953a);
            animation: blink 0.8s infinite;
            vertical-align: middle;
            margin-left: 2px;
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .dm-choices {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 16px;
        }
        .dm-choice-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: linear-gradient(165deg, #3a3440 0%, #302a36 100%);
            border: 1px solid var(--v-border, #3e3845);
            border-radius: 8px;
            color: var(--v-text-bright, #f0ebe4);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .dm-choice-btn:active {
            transform: scale(0.97);
            border-color: var(--v-gold-dim, #9a7530);
        }
        .dm-choice-btn:hover {
            border-color: var(--v-gold-dim, #9a7530);
            box-shadow: 0 0 10px rgba(196, 149, 58, 0.1);
        }
        .choice-icon { font-size: 18px; flex-shrink: 0; }
        .choice-label { flex: 1; }
        .choice-check {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 8px;
            background: rgba(196, 149, 58, 0.2);
            color: var(--v-gold, #c4953a);
            white-space: nowrap;
        }

        /* ═══════════════════════════════════════════
           STAT CHECK OVERLAY
           ═══════════════════════════════════════════ */
        .check-overlay {
            position: fixed;
            inset: 0;
            background: rgba(43, 40, 48, 0.97);
            z-index: 300;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .check-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .dice-display {
            font-size: 64px;
            animation: diceRoll 0.6s ease;
        }
        @keyframes diceRoll {
            0% { transform: rotate(0deg) scale(0.5); opacity: 0; }
            50% { transform: rotate(180deg) scale(1.2); }
            100% { transform: rotate(360deg) scale(1); opacity: 1; }
        }
        .check-formula {
            font-size: 18px;
            color: var(--v-text-dim, #8a8090);
        }
        .check-formula b { color: var(--v-text-bright, #f0ebe4); }
        .check-result {
            font-size: 24px;
            font-weight: 900;
            padding: 8px 20px;
            border-radius: 10px;
        }
        .check-result.success {
            color: #4a8;
            background: rgba(68, 170, 136, 0.15);
            border: 1px solid rgba(68, 170, 136, 0.3);
        }
        .check-result.failure {
            color: #a44;
            background: rgba(170, 68, 68, 0.15);
            border: 1px solid rgba(170, 68, 68, 0.3);
        }

        /* ═══════════════════════════════════════════
           OUTCOME OVERLAY
           ═══════════════════════════════════════════ */
        .outcome-overlay {
            position: fixed;
            inset: 0;
            background: rgba(43, 40, 48, 0.95);
            z-index: 250;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .outcome-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .outcome-text {
            font-style: italic;
            line-height: 1.6;
            color: var(--v-text, #e0d6c8);
            margin-bottom: 16px;
            text-align: center;
        }
        .outcome-rewards {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .outcome-reward {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            animation: rewardPop 0.4s ease;
        }
        .outcome-reward.xp { background: rgba(255, 215, 0, 0.15); color: #ffd700; }
        .outcome-reward.gold { background: rgba(196, 149, 58, 0.15); color: var(--v-gold, #c4953a); }
        .outcome-reward.heal { background: rgba(68, 170, 136, 0.15); color: #4a8; }
        .outcome-reward.damage { background: rgba(170, 68, 68, 0.15); color: #a44; }
        .outcome-reward.item { background: rgba(150, 100, 200, 0.15); color: #a8a; }
        @keyframes rewardPop {
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
        .btn-continue {
            padding: 12px 24px;
            background: linear-gradient(180deg, rgba(196,149,58,0.2), rgba(196,149,58,0.1));
            border: 1px solid var(--v-gold-dim, #9a7530);
            color: var(--v-gold, #c4953a);
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            align-self: center;
        }
        .btn-continue:active { transform: scale(0.95); }

        /* ═══════════════════════════════════════════
           COMBAT WARNING
           ═══════════════════════════════════════════ */
        .combat-overlay {
            position: fixed;
            inset: 0;
            background: rgba(123, 32, 32, 0.95);
            z-index: 400;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .combat-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .combat-icon { font-size: 64px; animation: combatShake 0.5s ease; }
        @keyframes combatShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .combat-text {
            font-size: 18px;
            color: #f0ebe4;
            text-align: center;
            max-width: 280px;
        }
        .combat-enemy {
            font-size: 22px;
            font-weight: 900;
            color: var(--v-gold, #c4953a);
        }

        /* ═══════════════════════════════════════════
           LOADING
           ═══════════════════════════════════════════ */
        #loading {
            position: fixed;
            inset: 0;
            background: var(--v-bg, #2b2830);
            z-index: 500;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }
        #loading.hidden { display: none; }
        .loading-icon { font-size: 48px; animation: spin 2s linear infinite; }
        @keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }
        .loading-text { color: var(--v-text-dim, #8a8090); font-size: 14px; }
    </style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading">
    <div class="loading-icon">🗺️</div>
    <div class="loading-text">Gerando mapa...</div>
</div>

<!-- HUD -->
<div id="hud">
    <span class="hud-name" id="hud-name">Herói</span>
    <div class="hud-stat">
        <span>❤️</span>
        <div class="hp-bar"><div class="hp-fill" id="hp-fill"></div></div>
        <span id="hp-text">10/10</span>
    </div>
    <div class="hud-rewards">
        <span class="reward-badge" id="badge-xp">✨ 0</span>
        <span class="reward-badge" id="badge-gold">💰 0</span>
    </div>
</div>

<!-- Map Viewport -->
<div id="map-viewport">
    <div id="map-container">
        <div id="player-token"></div>
    </div>
</div>

<!-- Bottom Bar -->
<div id="bottom-bar">
    <button class="btn-return" id="btn-return" onclick="finishExploration('exit')">⬅️ Retornar</button>
    <div class="location-info" id="location-info">Carregando...</div>
</div>

<!-- DM Narration Overlay -->
<div class="dm-overlay" id="dm-overlay">
    <div class="dm-card">
        <div class="dm-header">
            <span class="dm-icon" id="dm-icon">📜</span>
            <div>
                <div class="dm-title" id="dm-title">Evento</div>
                <div class="dm-type-badge" id="dm-type">descoberta</div>
            </div>
        </div>
        <div class="dm-narration" id="dm-narration"></div>
        <div class="dm-choices" id="dm-choices"></div>
    </div>
</div>

<!-- Stat Check Overlay -->
<div class="check-overlay" id="check-overlay">
    <div class="dice-display" id="dice-display">🎲</div>
    <div class="check-formula" id="check-formula"></div>
    <div class="check-result" id="check-result"></div>
</div>

<!-- Outcome Overlay -->
<div class="outcome-overlay" id="outcome-overlay">
    <div class="dm-card">
        <div class="outcome-text" id="outcome-text"></div>
        <div class="outcome-rewards" id="outcome-rewards"></div>
        <button class="btn-continue" onclick="closeOutcome()">Continuar</button>
    </div>
</div>

<!-- Combat Warning Overlay -->
<div class="combat-overlay" id="combat-overlay">
    <div class="combat-icon" id="combat-icon">⚔️</div>
    <div class="combat-enemy" id="combat-enemy"></div>
    <div class="combat-text" id="combat-text"></div>
</div>

<!-- Portal Overlay (exit transition) -->
<div class="portal-overlay" id="portal-overlay">
    <div class="portal-icon">🚪</div>
    <div class="portal-title">EXPLORAÇÃO CONCLUÍDA</div>
    <div class="portal-summary" id="portal-summary"></div>
</div>

<!-- Random Encounter Overlay -->
<div class="encounter-overlay" id="encounter-overlay">
    <div class="dm-card">
        <div class="dm-header">
            <span class="dm-icon" id="enc-icon">⚠️</span>
            <div>
                <div class="dm-title" id="enc-title">Encontro!</div>
                <div class="dm-type-badge" style="background:rgba(180,50,50,0.2);color:#c44" id="enc-type">surpresa</div>
            </div>
        </div>
        <div class="dm-narration" id="enc-narration"></div>
        <div class="dm-choices" id="enc-choices"></div>
    </div>
</div>

<script src="explore-core.js"></script>
<script src="explore-events.js"></script>
</body>
</html>
