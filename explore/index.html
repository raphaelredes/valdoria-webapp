<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2b2830">
    <title>Explorar - Lendas de Valdoria</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="../valdoria-design.css?v=6">
    <link rel="stylesheet" href="explore.css?v=11">
</head>
<body>

<!-- Toast container (outside overflow:hidden body flow) -->
<div id="toast-layer"></div>

<!-- Loading Screen -->
<div id="loading">
    <div class="loading-icon">🗺️</div>
    <div class="loading-text">Gerando mapa...</div>
</div>

<!-- HUD -->
<div id="hud">
    <span class="hud-name" id="hud-name">Herói</span>
    <div class="hud-stat">
        <span>❤️</span>
        <div class="hp-bar"><div class="hp-fill" id="hp-fill"></div></div>
        <span id="hp-text">10/10</span>
    </div>
    <div class="hud-rewards">
        <span class="reward-badge" id="badge-xp">✨ 0</span>
        <span class="reward-badge" id="badge-gold">💰 0</span>
    </div>
</div>

<!-- Condition Bar (D&D 5e status effects) -->
<div id="condition-bar" class="condition-bar"></div>

<!-- Map Viewport -->
<div id="map-viewport">
    <canvas id="iso-map"></canvas>
</div>

<!-- Bottom Bar -->
<div id="bottom-bar">
    <button class="btn-return" id="btn-return" onclick="finishExploration('exit')">⬅️ Retornar</button>
    <div class="bar-center">
        <span class="step-counter" id="step-counter">⬡ 0</span>
        <div class="danger-pips" id="danger-pips">
            <span class="pip"></span>
            <span class="pip"></span>
            <span class="pip"></span>
            <span class="pip"></span>
            <span class="pip"></span>
        </div>
    </div>
    <div class="location-info" id="location-info">Carregando...</div>
</div>

<!-- DM Narration Overlay -->
<div class="dm-overlay" id="dm-overlay">
    <div class="dm-card">
        <div class="dm-header">
            <span class="dm-icon" id="dm-icon">📜</span>
            <div>
                <div class="dm-title" id="dm-title">Evento</div>
                <div class="dm-type-badge" id="dm-type">descoberta</div>
            </div>
        </div>
        <div class="dm-narration" id="dm-narration"></div>
        <div class="dm-choices" id="dm-choices"></div>
    </div>
</div>

<!-- Stat Check Overlay -->
<div class="check-overlay" id="check-overlay">
    <div class="dice-display" id="dice-display">🎲</div>
    <div class="check-formula" id="check-formula"></div>
    <div class="check-result" id="check-result"></div>
    <button class="v-skip-btn" id="check-skip-btn">Continuar >></button>
</div>

<!-- Outcome Overlay -->
<div class="outcome-overlay" id="outcome-overlay">
    <div class="dm-card">
        <div class="outcome-text" id="outcome-text"></div>
        <div class="outcome-rewards" id="outcome-rewards"></div>
        <button class="btn-continue" onclick="closeOutcome()">Continuar</button>
    </div>
</div>

<!-- Combat Warning Overlay -->
<div class="combat-overlay" id="combat-overlay">
    <div class="combat-icon" id="combat-icon">⚔️</div>
    <div class="combat-enemy" id="combat-enemy"></div>
    <div class="combat-text" id="combat-text"></div>
    <button class="v-skip-btn" id="combat-skip-btn">Entrar em Combate >></button>
</div>

<!-- Portal Overlay (exit transition) -->
<div class="portal-overlay" id="portal-overlay">
    <div class="portal-icon">🚪</div>
    <div class="portal-title">EXPLORAÇÃO CONCLUÍDA</div>
    <div class="portal-summary" id="portal-summary"></div>
    <button class="v-skip-btn" id="portal-skip-btn">Continuar >></button>
</div>

<!-- Random Encounter Overlay -->
<div class="encounter-overlay" id="encounter-overlay">
    <div class="dm-card">
        <div class="dm-header">
            <span class="dm-icon" id="enc-icon">⚠️</span>
            <div>
                <div class="dm-title" id="enc-title">Encontro!</div>
                <div class="dm-type-badge" style="background:rgba(180,50,50,0.2);color:#c44" id="enc-type">surpresa</div>
            </div>
        </div>
        <div class="dm-narration" id="enc-narration"></div>
        <div class="dm-choices" id="enc-choices"></div>
    </div>
</div>

<script src="explore-iso.js"></script>
<script src="explore-tiles.js"></script>
<script src="explore-fog.js"></script>
<script src="explore-movement.js"></script>
<script src="explore-renderer.js"></script>
<script src="explore-core.js"></script>
<script src="explore-events.js"></script>
<script src="explore-particles.js"></script>
</body>
</html>
